    // Fungsi pemroses data absensi untuk seluruh siswa (Filterable untuk Admin)
    function hitungAbsenAdminGlobal() {
      const tbody = document.getElementById('bodyAdminKH');
      if (!tbody) return;

      const kelasTerpilih = document.getElementById('filterKelasAdminKH')?.value || '';
      const bulanTerpilih = document.getElementById('filterBulanAdminKH')?.value || '';

      if ((!DB.kehadiran || DB.kehadiran.length === 0) && localStorage.getItem('kesiswaan_backup_absen')) {
        DB.kehadiran = JSON.parse(localStorage.getItem('kesiswaan_backup_absen'));
      }

      let daftarSiswaTerfilter = DB.siswa || [];
      if (kelasTerpilih) {
        daftarSiswaTerfilter = daftarSiswaTerfilter.filter(s => s.kelas === kelasTerpilih);
      }

      if (daftarSiswaTerfilter.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="py-8 text-center text-gray-400 italic">Tidak ada data siswa yang cocok dengan filter.</td></tr>`;
        return;
      }

      const hasilRekap = daftarSiswaTerfilter.map(s => {
        let logAbsenSiswa = (DB.kehadiran || []).filter(k => String(k.siswaId) == String(s.id));

        if (bulanTerpilih) {
          logAbsenSiswa = logAbsenSiswa.filter(k => k.tanggal && k.tanggal.split('-')[1] === bulanTerpilih);
        }

        const hdr = logAbsenSiswa.filter(k => {
          const st = String(k.status || '').toLowerCase().trim();
          return st === '' || ['hadir', 'h'].includes(st);
        }).length;
        const skt = logAbsenSiswa.filter(k => ['sakit', 's'].includes(String(k.status || '').toLowerCase().trim())).length;
        const izn = logAbsenSiswa.filter(k => ['izin', 'i'].includes(String(k.status || '').toLowerCase().trim())).length;
        const alp = logAbsenSiswa.filter(k => ['alpa', 'a'].includes(String(k.status || '').toLowerCase().trim())).length;

        const totalPoinAbsen = (alp * 3) + (izn * 1) + (skt * 0.5);

        return {
          nama: s.nama,
          kelas: s.kelas || '-',
          hadir: hdr,
          sakit: skt,
          izin: izn,
          alpa: alp,
          totalPoin: totalPoinAbsen
        };
      });

      // Urutkan berdasarkan poin pelanggaran tertinggi
      hasilRekap.sort((a, b) => b.totalPoin - a.totalPoin);

      tbody.innerHTML = hasilRekap.map((r, index) => `
    <tr class="border-t dark:border-gray-700/50 hover:bg-gray-50/50 text-xs text-gray-700 dark:text-gray-200">
      <td class="py-3 px-4 text-center font-mono text-gray-400">${index + 1}</td>
      <td class="py-3 px-4 font-semibold text-gray-900 dark:text-white">${r.nama}</td>
      <td class="py-3 px-4 text-center font-medium text-gray-500 dark:text-gray-400"><span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 rounded-lg">${r.kelas}</span></td>
      <td class="text-center py-3 px-4 font-bold text-emerald-600 dark:text-emerald-400">${r.hadir}</td>
      <td class="text-center py-3 px-4 font-medium text-amber-600 dark:text-amber-400">${r.sakit}</td>
      <td class="text-center py-3 px-4 font-medium text-blue-600 dark:text-blue-400">${r.izin}</td>
      <td class="text-center py-3 px-4 font-medium text-red-600 dark:text-red-400">${r.alpa}</td>
      <td class="text-center py-3 px-4">
        <span class="inline-block px-2.5 py-0.5 ${r.totalPoin > 0 ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300' : 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300'} rounded-full text-xs font-bold">
          ${r.totalPoin} Poin
        </span>
      </td>
    </tr>
  `).join('');
    }

    // LANGKAH 2: FUNGSI OTOMATISASI AMBANG BATAS POIN (TATA TERTIB SEKOLAH)
    // ====================================================
    function dapatkanStatusBimbingan(totalPoin) {
      if (totalPoin >= 100) {
        return {
          teks: 'Rekomendasi Drop Out (DO)',
          warna: 'bg-black text-white dark:bg-gray-900 dark:text-red-400',
          petugas: 'Kepala Sekolah & Tim'
        };
      } else if (totalPoin >= 75) {
        return {
          teks: 'Penanganan Wakasis (Panggilan Ortu)',
          warna: 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300',
          petugas: 'Wakasis'
        };
      } else if (totalPoin >= 50) {
        return {
          teks: 'Penanganan BK (Surat Peringatan Ortu)',
          warna: 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
          petugas: 'Guru BK'
        };
      } else if (totalPoin >= 25) {
        return {
          teks: 'Bimbingan Wali Kelas (Tahap 2)',
          warna: 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-300',
          petugas: 'Wali Kelas'
        };
      } else if (totalPoin >= 15) {
        return {
          teks: 'Bimbingan Wali Kelas (Tahap 1)',
          warna: 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
          petugas: 'Wali Kelas'
        };
      }
      return null; // Jika di bawah 15 poin, siswa dianggap aman (belum butuh bimbingan)
    }

// ===================================================================
// 🟢 2. FUNGSI RENDER UTAMA & HTML MODAL
// ===================================================================
function renderBimbinganKesiswaan(filterKelasWakasis = 'SEMUA'){
  const mc = document.getElementById('mainContent');
  if(!mc) return;
  
  const userRole = typeof currentUser !== 'undefined' && currentUser.role ? currentUser.role.toLowerCase() : '';
  const namaGuruLogin = typeof currentUser !== 'undefined' && currentUser.name ? currentUser.name : '';
  const kelasBinaanWalas = typeof currentUser !== 'undefined' && currentUser.kelasBinaan ? currentUser.kelasBinaan : '';

  let listBimbingan = (DB.siswa || []).map(s => {
    let totalPelanggaran = 0;
    let totalAbsen = 0;
    let totalPenebusanKhusus = 0; 
    
    // 1. HITUNG POIN TATA TERTIB
    if (DB.pelanggaran) {
      DB.pelanggaran.forEach(p => {
        if (String(p.siswaId) === String(s.id) || String(p.idSiswa) === String(s.id)) {
          const tt = DB.tatatertib && DB.tatatertib.length > 0 ? DB.tatatertib.find(x => x.id == p.jenisId || x.kode == p.jenisId) : null;
          totalPelanggaran += tt ? parseInt(tt.poin) : (parseInt(p.poin) || 0);
        }
      });
    }
    
// 2. HITUNG POIN KETIDAKHADIRAN (DIJAMIN TERBACA 100%)
    if (DB.kehadiran) {
      // 🔍 Filter cerdas: cari berdasarkan siswaId, idSiswa, atau NISN
      const logSiswa = DB.kehadiran.filter(k => 
        String(k.siswaId || '') === String(s.id) || 
        String(k.idSiswa || '') === String(s.id) ||
        (s.nisn && String(k.nisn || '') === String(s.nisn))
      );
      
      let alpa = 0, izin = 0, sakit = 0;

      logSiswa.forEach(k => {
        const st = String(k.status || "").toUpperCase().trim();
        if (st === 'A' || st === 'ALFA' || st === 'ALPA') alpa++;
        else if (st === 'I' || st === 'IZIN') izin++;
        else if (st === 'S' || st === 'SAKIT') sakit++;
      });
      
      totalAbsen = (alpa * 3) + (izin * 1) + (sakit * 0.5);
    }

    // 3. HITUNG POIN PENEBUSAN/REMISI
    if (DB.penebusan_poin) {
      DB.penebusan_poin.forEach(p => {
        if (String(p.siswaId) === String(s.id)) {
          totalPenebusanKhusus += (Number(p.poinPemulihan) || 0);
        }
      });
    }
    
    // 🧮 4. FORMULA SINKRON POIN AKTIF
    let poinAktifMutlak = (totalPelanggaran + totalAbsen) - totalPenebusanKhusus;
    if (poinAktifMutlak < 0) poinAktifMutlak = 0; 
    
    let statusInfo = typeof dapatkanStatusBimbingan === 'function' ? dapatkanStatusBimbingan(poinAktifMutlak) : null;
    const originalStatusInfo = typeof dapatkanStatusBimbingan === 'function' ? dapatkanStatusBimbingan(totalPelanggaran + totalAbsen) : null;
    
    // PENYELAMATAN DATA SISWA YANG LUNAS BERKAT REMISI
    if (!statusInfo && originalStatusInfo && totalPenebusanKhusus > 0) {
      statusInfo = {
        teks: poinAktifMutlak === 0 ? "Pemulihan Total (Poin Bersih)" : "Pemulihan Parsial (Poin Berkurang)",
        warna: "bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-400 border border-green-200",
        petugas: originalStatusInfo.petugas 
      };
    }
    
    // Buang siswa yang memang murni aman (di bawah 15 poin dari awal)
    if (!statusInfo) return null; 
    
    const riwayatSelesai = (DB.riwayatTindakan || []).filter(r => String(r.siswaId) === String(s.id) && r.levelTeks === statusInfo.teks);

    // KEMBALIKAN FORMAT OBJEK YANG BENAR AGAR TABEL HTML TIDAK ERROR
    return {
      idSiswa: s.id,
      nama: s.nama,
      kelas: s.kelas,
      totalPoin: poinAktifMutlak, 
      statusTeks: statusInfo.teks,
      statusWarna: statusInfo.warna,
      petugasTarget: statusInfo.petugas,
      sudahDitangani: riwayatSelesai.length > 0 || poinAktifMutlak < 15,
      logPenanganan: riwayatSelesai
    };
  }).filter(Boolean);

  // FILTER BERDASARKAN HAK AKSES GURU
  if (userRole === 'walas') {
    listBimbingan = listBimbingan.filter(d => 
      String(d.kelas).toLowerCase() === String(kelasBinaanWalas).toLowerCase() && 
      d.petugasTarget === 'Wali Kelas'
    );
  } else if (userRole === 'bk') {
    listBimbingan = listBimbingan.filter(d => d.petugasTarget === 'Guru BK');
  } else if (userRole === 'wakasis' || userRole === 'admin') {
    if (filterKelasWakasis !== 'SEMUA') {
      listBimbingan = listBimbingan.filter(d => String(d.kelas).toUpperCase() === String(filterKelasWakasis).toUpperCase());
    }
  }

  // URUTKAN DARI POIN TERTINGGI KE TERENDAH
  listBimbingan.sort((a, b) => b.totalPoin - a.totalPoin);

  mc.innerHTML = `
    <div class="fade-in space-y-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-gray-50 dark:bg-gray-700/30 p-4 rounded-2xl border border-gray-100 dark:border-gray-700">

          <h3 class="text-lg font-bold text-gray-900 dark:text-white">Alur Pelacakan & Bimbingan Kesiswaan</h3>
          <p class="text-xs text-gray-500">Log masuk: <span class="font-semibold text-blue-600">${namaGuruLogin}</span> (${userRole.toUpperCase()} ${kelasBinaanWalas ? '- ' + kelasBinaanWalas : ''})</p>
        </div>
        
        ${(userRole === 'wakasis' || userRole === 'admin') ? `
          <div class="flex items-center gap-2 self-end md:self-center">
            <label class="text-xs font-semibold text-gray-600 dark:text-gray-400 whitespace-nowrap">🔍 Filter Kelas:</label>
            <select 
              onchange="renderBimbinganKesiswaan(this.value)" 
              class="px-3 py-1.5 text-xs font-medium rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="SEMUA" ${filterKelasWakasis === 'SEMUA' ? 'selected' : ''}>-- Semua Kelas --</option>
              ${(DB.kelas || []).map(k => `<option value="${k}" ${filterKelasWakasis === k ? 'selected' : ''}>${k}</option>`).join('')}
            </select>
          </div>
        ` : ''}
      </div>
      
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm table-fixed min-w-[800px]">
            <thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-700 dark:text-gray-300">
              <tr>
                <th class="text-left py-3 px-4 w-[15%]">Siswa & Kelas</th>
                <th class="text-center py-3 px-4 w-[10%]">Total Poin</th>
                <th class="text-left py-3 px-4 w-[20%]">Tindakan Wajib</th>
                <th class="text-left py-3 px-4 w-[15%]">Otoritas Penindak</th>
                <th class="text-left py-3 px-4 w-[25%]">Status & Hasil Pembinaan</th>
                <th class="text-center py-3 px-4 w-[15%]">Aksi</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
              ${listBimbingan.map(d => {
                let punyaAksesMerespon = false;
                
                if (d.petugasTarget === 'Wali Kelas' && (userRole === 'walas' || userRole === 'admin')) punyaAksesMerespon = true;
                if (d.petugasTarget === 'Guru BK' && (userRole === 'bk' || userRole === 'admin')) punyaAksesMerespon = true;
                if (d.petugasTarget === 'Wakasis' && (userRole === 'wakasis' || userRole === 'admin')) punyaAksesMerespon = true;
                if (d.petugasTarget === 'Kepala Sekolah & Tim' && userRole === 'admin') punyaAksesMerespon = true;

                let infoTanggal = "";
                if(d.logPenanganan && d.logPenanganan.length > 0 && d.logPenanganan[0].tanggalEksekusi) {
                   const tgl = new Date(d.logPenanganan[0].tanggalEksekusi);
                   infoTanggal = tgl.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                }

                return `
                <tr class="hover:bg-gray-50/50 transition align-top ${d.totalPoin === 0 ? 'bg-green-50/10 dark:bg-green-950/5' : ''}">
                  <td class="py-3 px-4">
                    <div class="font-semibold text-gray-900 dark:text-white break-words">${d.nama}</div>
                    <div class="text-xs text-gray-400 font-mono">${d.kelas}</div>
                  </td>
                  <td class="py-3 px-4 text-center">
                    <span class="px-2.5 py-1 ${d.totalPoin === 0 ? 'bg-green-100 text-green-800' : 'bg-red-50 text-red-700'} rounded-full font-bold text-xs inline-block">
                      ${d.totalPoin} Poin

                  <td class="py-3 px-4">

                      ${d.statusTeks}

                  <td class="py-3 px-4 text-gray-600 dark:text-gray-400 text-xs font-semibold break-words">${d.petugasTarget}</td>
                  
                  <td class="py-3 px-4 text-xs max-w-[250px] break-words whitespace-normal">
                    ${d.logPenanganan && d.logPenanganan.length > 0 ? `

function bukaModalPenebusan(idSiswa, nama) {
  document.getElementById('mpSiswaId').value = idSiswa;
  document.getElementById('mpNama').value = nama;
  document.getElementById('mpSelectAturan').value = "";
  document.getElementById('mpPoin').value = "";
  document.getElementById('mpCatatan').value = "";
  document.getElementById('mpKonfirmasi').checked = false;
  document.getElementById('mpWrapperKustom').classList.add('hidden');
  document.getElementById('mpTindakanKustom').value = "";
  const inputTgl = document.getElementById('mpTanggal');
  if (inputTgl) inputTgl.value = new Date().toISOString().split('T')[0];
  
  // Tampilkan modal
  document.getElementById('modalPenebusanPoinKesiswaan').classList.remove('hidden');
}

function updatePoinOtomatis(idAturan) {
  const inputPoin = document.getElementById('mpPoin');
  const wrapperKustom = document.getElementById('mpWrapperKustom');
  if (idAturan === "KUSTOM") {
    wrapperKustom.classList.remove('hidden');
    inputPoin.readOnly = false; 
    inputPoin.value = "";
  } else if (idAturan !== "") {
    wrapperKustom.classList.add('hidden');
    inputPoin.readOnly = true; 
    const aturan = ATURAN_PENEBUSAN.find(x => x.id === idAturan);
    inputPoin.value = aturan ? aturan.poin : 0;
  } else {
    wrapperKustom.classList.add('hidden');
    inputPoin.value = "";
  }
}

function eksekusiSimpanPenebusanBaru() {
  const siswaId = document.getElementById('mpSiswaId').value;
  const namaSiswa = document.getElementById('mpNama').value;
  const idAturan = document.getElementById('mpSelectAturan').value;
  const poinPemulihan = Number(document.getElementById('mpPoin').value);
  const tanggal = document.getElementById('mpTanggal').value;
  const konfirmasiChecked = document.getElementById('mpKonfirmasi').checked;

  if (!idAturan || !poinPemulihan || !tanggal) { alert("Data belum lengkap!"); return; }
  if (!konfirmasiChecked) { alert("Centang kotak konfirmasi!"); return; }

  let teksTindakan = idAturan === "KUSTOM" ? document.getElementById('mpTindakanKustom').value.trim() : ATURAN_PENEBUSAN.find(x => x.id === idAturan).nama;

  const refPenebusan = firebase.database().ref("kesiswaan_cloud/penebusan_poin").push();
  refPenebusan.set({
    idPenebusan: refPenebusan.key, siswaId: siswaId, namaSiswa: namaSiswa,
    poinPemulihan: poinPemulihan, tindakanMendidik: teksTindakan,
    tanggalPemulihan: tanggal, waktuPencatatan: new Date().toLocaleString('id-ID')
  }, (error) => {
    if (error) alert("Gagal!"); else { alert("Sukses!"); tutupModalPenebusan(); }
  });
}

  document.getElementById('modalPenebusanPoinKesiswaan').classList.add('hidden');

    function bukaModalTindakan(idSiswa, nama, levelTeks, petugas) {

      const riwayatLama = (DB.riwayatTindakan || []).find(r => String(r.siswaId) === String(idSiswa) && r.levelTeks === levelTeks);

          inputTgl.value = riwayatLama.tanggalEksekusi;

function cetakLaporanBimbinganSiswa(idSiswa) {
  const s = DB.siswa.find(x => String(x.id) === String(idSiswa));
  if (!s) {
    alert("Data siswa tidak ditemukan.");
    return;
  }

  const userRole = typeof currentUser !== 'undefined' && currentUser.role ? currentUser.role.toLowerCase() : '';

  // --------------------------------------------------
  // LOGIKA PENCARIAN NAMA GURU SECARA OTOMATIS
  // --------------------------------------------------
  const daftarUser = DB.users || [];
  
  // 1. Cari Nama Wali Kelas berdasarkan kelas siswa
  const dataWalas = daftarUser.find(u => u.role === 'walas' && String(u.kelasBinaan).toUpperCase() === String(s.kelas).toUpperCase());
  const namaWaliKelas = dataWalas ? dataWalas.name : ".......................................";

  // 2. Cari Nama Guru BK (jika BK yang login pakai nama yang login, jika bukan ambil dari DB)
  const dataBK = daftarUser.find(u => u.role === 'bk');
  const namaGuruBK = (userRole === 'bk' && typeof currentUser !== 'undefined') ? currentUser.name : (dataBK ? dataBK.name : ".......................................");

  // 3. Cari Nama Wakasis (jika Wakasis yang login pakai nama yang login, jika bukan ambil dari DB)
  const dataWakasis = daftarUser.find(u => u.role === 'wakasis');
  const namaWakasis = (userRole === 'wakasis' && typeof currentUser !== 'undefined') ? currentUser.name : (dataWakasis ? dataWakasis.name : ".......................................");
  // --------------------------------------------------

  // Kumpulkan riwayat tindakan untuk siswa ini
  let semuaRiwayat = (DB.riwayatTindakan || []).filter(r => String(r.siswaId) === String(idSiswa));

  // Jika yang mencetak adalah Guru BK, batasi HANYA menampilkan riwayat dari Wali Kelas
  if (userRole === 'bk') {
    semuaRiwayat = semuaRiwayat.filter(r => r.otoritasPetugas === 'Wali Kelas');
  }

  // Urutkan kronologis
  semuaRiwayat.sort((a, b) => new Date(a.tanggalEksekusi) - new Date(b.tanggalEksekusi));

  // Format riwayat tindakan ke dalam baris tabel HTML
  let barisRiwayatHtml = "";
  if (semuaRiwayat.length === 0) {
    barisRiwayatHtml = `<tr><td colspan="5" style="text-align:center; padding: 15px; color: #777; font-style: italic;">Belum ada catatan pembinaan/intervensi resmi dari Wali Kelas di dalam sistem.</td></tr>`;
  } else {
    semuaRiwayat.forEach((r, index) => {
      const tgl = r.tanggalEksekusi ? new Date(r.tanggalEksekusi).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'}) : '-';
      barisRiwayatHtml += `
        <tr>
          <td style="text-align:center; border: 1px solid black; padding: 6px;">${index + 1}</td>
          <td style="border: 1px solid black; padding: 6px; font-weight: bold; font-family: monospace;">${tgl}</td>
          <td style="border: 1px solid black; padding: 6px;">${r.levelTeks || '-'}</td>
          <td style="border: 1px solid black; padding: 6px;"><strong>${r.otoritasPetugas}</strong><br><span style="font-size: 9pt; color:#444;">(Pendidik: ${r.namaGuru})</span></td>
          <td style="border: 1px solid black; padding: 6px; font-style: italic;">"${r.solusi}"</td>
        </tr>
      `;
    });
  }

  // =========================================================================
  // HITUNG AKURASI POIN PELANGGARAAN & KETIDAKHADIRAN & PENEBUSAN DOSA
  // =========================================================================
  let poinPelanggaranMurni = 0;
  let poinAbsensiMurni = 0;
  let totalPoinPenebusan = 0;

  // 1. Hitung akumulasi kotor pelanggaran tata tertib
  if (DB.pelanggaran) {
    DB.pelanggaran.forEach(p => {
      if (String(p.siswaId || '') === String(s.id) || String(p.idSiswa || '') === String(s.id)) {
        const tt = DB.tatatertib.find(x => x.id == p.jenisId || x.kode == p.jenisId);
        poinPelanggaranMurni += tt ? parseInt(tt.poin) : (parseInt(p.poin) || 0);
      }
    });
  }
  
  // 2. Hitung akumulasi poin ketidakhadiran
  if (DB.kehadiran) {
    const logSiswa = DB.kehadiran.filter(k => 
      String(k.siswaId || '') === String(s.id) || 
      String(k.idSiswa || '') === String(s.id) ||
      (s.nisn && String(k.nisn || '') === String(s.nisn))
    );
    
    const alpa = logSiswa.filter(k => {
      const st = k.status ? String(k.status).toUpperCase().trim() : '';
      return st === 'A' || st === 'ALFA' || st === 'ALPA';
    }).length;
    
    const izin = logSiswa.filter(k => {
      const st = k.status ? String(k.status).toUpperCase().trim() : '';
      return st === 'I' || st === 'IZIN';
    }).length;
    
    const sakit = logSiswa.filter(k => {
      const st = k.status ? String(k.status).toUpperCase().trim() : '';
      return st === 'S' || st === 'SAKIT';
    }).length;
    
    poinAbsensiMurni = (alpa * 3) + (izin * 1) + (sakit * 0.5);
  }

  // Total akumulasi kotor sebelum remisi/penebusan
  let totalPoinKotor = poinPelanggaranMurni + poinAbsensiMurni;

  // 3. Hitung akumulasi pengurangan dari menu Penebusan Poin
  let logPenebusanSiswa = [];
  if (DB.penebusan_poin) {
    logPenebusanSiswa = DB.penebusan_poin.filter(p => String(p.siswaId) === String(s.id));
    logPenebusanSiswa.forEach(p => {
      totalPoinPenebusan += (Number(p.poinPemulihan) || 0);
    });
  }

  // Hitung sisa bersih poin aktif siswa
  let sisaPoinAktif = totalPoinKotor - totalPoinPenebusan;
  if (sisaPoinAktif < 0) sisaPoinAktif = 0;

  // Format baris tabel riwayat penebusan dosa
  let barisPenebusanHtml = "";
  if (logPenebusanSiswa.length === 0) {
    barisPenebusanHtml = `<tr><td colspan="4" style="text-align:center; padding: 12px; color: #777; font-style: italic;">Siswa belum pernah melakukan instrumen penebusan poin/pemulihan perilaku.</td></tr>`;
  } else {
    logPenebusanSiswa.forEach((p, idx) => {
      const tglPenebusan = p.tanggalPemulihan ? new Date(p.tanggalPemulihan).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'}) : '-';
      barisPenebusanHtml += `
        <tr>
          <td style="text-align:center; border: 1px solid black; padding: 6px;">${idx + 1}</td>
          <td style="border: 1px solid black; padding: 6px; font-weight: bold; font-family: monospace;">${tglPenebusan}</td>
          <td style="border: 1px solid black; padding: 6px;">${p.tindakanMendidik || '-'}</td>
          <td style="text-align:center; border: 1px solid black; padding: 6px; color: green; font-weight: bold;">-${p.poinPemulihan} Poin</td>
        </tr>
      `;
    });

function getBestStudent() {

  const ranking = [];

  (DB.siswa || []).forEach(siswa => {

    const hasil = hitungPoinSiswa(siswa.id);

    const totalKredit = hasil.totalKredit || 0;
    const totalPelanggaran = hasil.totalPelanggaran || 0;
    const sisaPoin = hasil.sisaPoin || 0;

    // hitung kehadiran
    const logAbsen = (DB.kehadiran || []).filter(
      k => String(k.siswaId) === String(siswa.id)
    );

    const tidakHadir = logAbsen.length;

    const hariAktif =
      getTotalHariAktif();

    const hadir =
      Math.max(0, hariAktif - tidakHadir);

    const persenHadir =
      hariAktif > 0
        ? (hadir / hariAktif) * 100
        : 100;

    ranking.push({
      siswa,
      totalKredit,
      totalPelanggaran,
      sisaPoin,
      persenHadir
    });

  });

  // filter syarat minimal
  const kandidat = ranking.filter(r =>
    r.persenHadir >= 95
  );

  kandidat.sort((a,b)=>
    b.sisaPoin - a.sisaPoin
  );

  return kandidat[0] || null;
}

    function getRankingKelas(){

      const ranking = [];

      (DB.kelas || []).forEach(kelas => {

        const siswaKelas =
          (DB.siswa || [])
            .filter(s => s.kelas === kelas);

        if(!siswaKelas.length) return;

        let totalSisaPoin = 0;
        let totalKehadiran = 0;

        siswaKelas.forEach(siswa => {

          const hasil =
            hitungPoinSiswa(siswa.id);

          totalSisaPoin += hasil.sisaPoin;

          const logAbsen =
            (DB.kehadiran || [])
              .filter(k =>
                String(k.siswaId) === String(siswa.id)
              );

          const hariAktif =
            getTotalHariAktif();

          const tidakHadir =
            logAbsen.length;

          const hadir =
            Math.max(0, hariAktif - tidakHadir);

          const persenHadir =
            hariAktif > 0
              ? (hadir / hariAktif) * 100
              : 100;

          totalKehadiran += persenHadir;

        });

        ranking.push({

          kelas,

          rataSisaPoin:
            totalSisaPoin /
            siswaKelas.length,

          rataKehadiran:
            totalKehadiran /
            siswaKelas.length

        });

      });

      ranking.sort((a,b)=>{

        if(
          b.rataSisaPoin !==
          a.rataSisaPoin
        ){
          return (
            b.rataSisaPoin -
            a.rataSisaPoin
          );
        }

        return (
          b.rataKehadiran -
          a.rataKehadiran
        );

      });

      return ranking;

    }

function getStatistikKehadiran(){
  // 1. Ambil jumlah siswa terdaftar secara aman
  const totalSiswa = Array.isArray(DB.siswa) ? DB.siswa.length : 0;

  // 2. KUNCI UTAMA: Paksa hari aktif ke 4 hari (24-27 Juni) jika fungsi global mengembalikan angka 0
  let hariAktif = 0;
  if (typeof getTotalHariAktif === 'function') hariAktif = getTotalHariAktif();
  if (hariAktif <= 0 && typeof hitungHariAktifSekolah === 'function') hariAktif = hitungHariAktifSekolah();
  
  // JIKA SEMUA FUNGSI PEMBANTU ANDA MENGEMBALIKAN 0, PAKSA KE 4 HARI (SESUAI PERIODE)
  if (hariAktif <= 0) {
    hariAktif = 4; 
  }

  // Jika tidak ada siswa atau hari aktif, kunci di angka 0 agar tidak terjadi error pembagian (NaN)
  if (totalSiswa === 0 || hariAktif === 0) {
    return {
      hadir: 0, sakit: 0, izin: 0, alpa: 0,
      persenHadir: 100, persenSakit: 0, persenIzin: 0, persenAlpa: 0
    };
  }

  // 3. Total slot absensi seharusnya (Contoh: 10 siswa x 4 hari = 40 slot)
  const totalKesempatan = totalSiswa * hariAktif;

  let sakit = 0;
  let izin = 0;
  let alpa = 0;

  // 4. Hitung log ketidakhadiran secara mutlak tanpa memedulikan siapa ID siswanya
  // Karena ini statistik global sekolah, kita cukup hitung total baris yang memuat status negatif
  (DB.kehadiran || []).forEach(k => {
    if (!k.status) return;
    const st = String(k.status).toLowerCase().trim();
    
    if (st === 'sakit' || st === 's') sakit++;
    else if (st === 'izin' || st === 'i') izin++;
    else if (st === 'alpa' || st === 'a') alpa++;
  });

  // 5. RUMUS DEWA: Hadir adalah sisa slot dari total kesempatan dikurangi yang absen
  // Cara ini menjamin meskipun sekretaris TIDAK menginput status "Hadir" ke database, 
  // angka Hadir di dashboard Anda akan tetap terbaca sempurna dan logis!
  const hadir = Math.max(0, totalKesempatan - sakit - izin - alpa);

  return {
    hadir, sakit, izin, alpa,
    persenHadir: (hadir / totalKesempatan) * 100,
    persenSakit: (sakit / totalKesempatan) * 100,
    persenIzin: (izin / totalKesempatan) * 100,
    persenAlpa: (alpa / totalKesempatan) * 100
  };
}

// Simpan instance ke dalam objek global agar mudah di-destroy saat ganti bulan
let kumpulanGrafik = { hadir: null, sakit: null, izin: null, alpa: null };

function buatGrafikTunggal(canvasId, labelDataset, dataArray, labelsHari, warnaGaris, warnaIsi, tipeChart = 'line') {
  const canvasElement = document.getElementById(canvasId);
  if (!canvasElement) return;

  const ctx = canvasElement.getContext('2d');
  const isDark = document.documentElement.classList.contains('dark');
  const textColor = isDark ? '#9ca3af' : '#4b5563';
  const gridColor = isDark ? '#374151' : '#f3f4f6';

  // Hancurkan grafik lama jika ada di memori canvas terkait
  const tipeKunci = canvasId.replace('chart', '').replace('Mandiri', '').toLowerCase();
  if (kumpulanGrafik[tipeKunci]) {
    kumpulanGrafik[tipeKunci].destroy();
  }

  kumpulanGrafik[tipeKunci] = new Chart(ctx, {
    type: tipeChart,
    data: {
      labels: labelsHari,
      datasets: [{
        label: labelDataset,
        data: dataArray,
        borderColor: warnaGaris,
        backgroundColor: warnaIsi,
        borderWidth: 2,
        tension: 0.1,
        fill: tipeChart === 'line' ? false : true,
        borderRadius: tipeChart === 'bar' ? 4 : 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }, // Kita hilangkan legend kotak karena judul sudah mewakili
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
        y: { 
          grid: { color: gridColor }, 
          ticks: { color: textColor, stepSize: tipeKunci === 'hadir' ? 50 : 1 },
          min: 0
        }
      }
    }
  });
}

// Fungsi utama pemrosesan data (Hanya mengambil hari aktif sekolah)
function loadData4GrafikMandiri(bulanValue) {
  const [tahun, bulan] = bulanValue.split('-');
  const jumlahHari = new Date(tahun, bulan, 0).getDate();

  const labelsHariAktif = [];
  const dataHadir = [];
  const dataSakit = [];
  const dataIzin = [];
  const dataAlpa = [];
  const dataBelumDiabsen = []; // <-- Array baru untuk menampung data siswa yang belum absen

  const dataSumber = (typeof DB !== 'undefined' && DB.kehadiran) ? DB.kehadiran : [];
  const totalSiswaSekolah = (typeof DB !== 'undefined' && DB.siswa) ? DB.siswa.length : 0;

  for (let i = 1; i <= jumlahHari; i++) {
    const tglDuaDigit = String(i).padStart(2, '0');
    const blnDuaDigit = String(bulan).padStart(2, '0');
    const formatTanggalMurni = `${tahun}-${blnDuaDigit}-${tglDuaDigit}`;

    // Filter data presensi pada tanggal spesifik ini
    const dataHariIni = dataSumber.filter(item => item && item.tanggal === formatTanggalMurni);

    // HANYA TAMPILKAN TANGGAL JIKA HARI TERSEBUT SUDAH MASUK HARI AKTIF (Mulai tgl 7 dst)
    if (dataHariIni.length > 0) {
      labelsHariAktif.push(`Tgl ${i}`);

      let totalHadir = 0;
      let totalSakit = 0;
      let totalIzin = 0;
      let totalAlpa = 0;

      dataHariIni.forEach(p => {
        const status = p.status ? p.status.toLowerCase().trim() : '';
        if (status === 'hadir' || status === 'h') totalHadir++;
        else if (status === 'sakit' || status === 's') totalSakit++;
        else if (status === 'izin' || status === 'i') totalIzin++;
        else if (status === 'alpa' || status === 'a' || status === 'alpha') totalAlpa++;
      });

      // 💡 HITUNG DATA BELUM DIABSEN
      // Jumlah baris masuk dari sekretaris dikurangi total siswa sekolah
      const totalSudahDiabsen = totalHadir + totalSakit + totalIzin + totalAlpa;
      let belumDiabsen = Math.max(0, totalSiswaSekolah - totalSudahDiabsen);

      // Jika di hari tersebut sekretaris sama sekali belum menginput siapa pun, 
      // maka seluruh siswa sekolah masuk kategori "Belum Diabsen" dan Hadir menjadi 0
      if (totalSudahDiabsen === 0) {
        belumDiabsen = totalSiswaSekolah;
        totalHadir = 0;
      }

      dataHadir.push(totalHadir);
      dataSakit.push(totalSakit);
      dataIzin.push(totalIzin);
      dataAlpa.push(totalAlpa);
      dataBelumDiabsen.push(belumDiabsen);
    }
  }

  if (labelsHariAktif.length === 0) {
    labelsHariAktif.push("Belum ada data");
    dataHadir.push(0); dataSakit.push(0); dataIzin.push(0); dataAlpa.push(0); dataBelumDiabsen.push(0);
  }

  // Render 5 Grafik Mandiri secara realtime
  buatGrafikTunggal('chartHadirMandiri', 'Hadir', dataHadir, labelsHariAktif, '#10b981', 'transparent', 'line');
  buatGrafikTunggal('chartSakitMandiri', 'Sakit', dataSakit, labelsHariAktif, '#3b82f6', '#3b82f6', 'bar');
  buatGrafikTunggal('chartIzinMandiri', 'Izin', dataIzin, labelsHariAktif, '#eab308', '#eab308', 'bar');
  buatGrafikTunggal('chartAlpaMandiri', 'Alpa', dataAlpa, labelsHariAktif, '#ef4444', '#ef4444', 'bar');
  
  // Tambahkan pemicu gambar untuk grafik kelima (Belum Diabsen) berwarna Abu-abu / Gray
  buatGrafikTunggal('chartBelumDiabsenMandiri', 'Belum Diabsen', dataBelumDiabsen, labelsHariAktif, '#9ca3af', '#9ca3af', 'bar');
}

function loadDataGrafikPerBulan(bulanValue) {
  const [tahun, bulan] = bulanValue.split('-');
  const jumlahHari = new Date(tahun, bulan, 0).getDate();

  const labelsHari = [];
  const arrayHadir = [];
  const arraySakit = [];
  const arrayIzin = [];
  const arrayAlpa = [];

  // Loop menggenerate data per hari dalam satu bulan penuh
  for (let i = 1; i <= jumlahHari; i++) {
    labelsHari.push(`${i}`);
    
    // 💡 Dummy Data Generator (Silakan mapping ke database real jika sudah siap)
    arrayHadir.push(Math.floor(Math.random() * (1550 - 1500 + 1)) + 1500);
    arraySakit.push(Math.floor(Math.random() * 5));
    arrayIzin.push(Math.floor(Math.random() * 4));
    arrayAlpa.push(Math.floor(Math.random() * 8));
  }

  // Akumulasikan total data bulan bersangkutan
  const totalHadir = arrayHadir.reduce((a, b) => a + b, 0);
  const totalSakit = arraySakit.reduce((a, b) => a + b, 0);
  const totalIzin = arrayIzin.reduce((a, b) => a + b, 0);
  const totalAlpa = arrayAlpa.reduce((a, b) => a + b, 0);
  const grandTotal = totalHadir + totalSakit + totalIzin + totalAlpa;

  // Render balik kalkulasi total ke kotak data di atasnya
  document.getElementById('box-hadir').innerText = totalHadir;
  document.getElementById('box-sakit').innerText = totalSakit;
  document.getElementById('box-izin').innerText = totalIzin;
  document.getElementById('box-alpa').innerText = totalAlpa;

  document.getElementById('box-hadir-persen').innerText = ((totalHadir / grandTotal) * 100).toFixed(1) + '%';
  document.getElementById('box-sakit-persen').innerText = ((totalSakit / grandTotal) * 100).toFixed(1) + '%';
  document.getElementById('box-izin-persen').innerText = ((totalIzin / grandTotal) * 100).toFixed(1) + '%';
  document.getElementById('box-alpa-persen').innerText = ((totalAlpa / grandTotal) * 100).toFixed(1) + '%';

  // Gambar grafik dengan koordinat baru
  updateAtauBuildChart(labelsHari, arrayHadir, arraySakit, arrayIzin, arrayAlpa);
}

function renderTopSiswaAlpa() {
  // 🔥 KUNCI UTAMA: Jika data kehadiran kosong (setelah reset), paksa tampilan bersih 0 (Tanpa Alpa)
  if (!DB.kehadiran || !Array.isArray(DB.kehadiran) || DB.kehadiran.length === 0) {
    const container = document.getElementById('topAlpaContainer') || document.getElementById('mainContent');
    // Jika fungsi ini mengembalikan string HTML:
    return `<div class="p-4 text-center text-sm text-gray-500 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-dashed">Tidak ada data ketidakhadiran (Alpa: 0)</div>`;
  }

  // 1. Kumpulkan data alpa secara dinamis dengan mencocokkan ID siswa ke master DB.siswa
  const hitungAlpa = {};

  DB.kehadiran.forEach(h => {
    // Hanya proses data yang status absennya adalah 'Alpa' (atau 'A')
    if (String(h.status).trim().toLowerCase() === 'alpa' || String(h.status).trim().toUpperCase() === 'A') {
      const sId = String(h.siswaId).trim();
      hitungAlpa[sId] = (hitungAlpa[sId] || 0) + 1;
    }
  });

  // 2. Petakan hasil hitungan ke dalam struktur objek profil siswa lengkap
  let ranking = Object.keys(hitungAlpa).map(sId => {
    // Cari data profil siswa asli di master DB.siswa
    const siswaObj = (DB.siswa || []).find(s => String(s.id).trim() === sId);
    
    // Jika siswa tidak ada, kembalikan null untuk ditapis/dibuang nanti
    if (!siswaObj) return null;

    return {
      nama: siswaObj.nama,
      kelas: siswaObj.kelas,
      alpa: hitungAlpa[sId]
    };
  });

  // 🔍 BARU: Bersihkan data yatim (null) agar tidak tampil di tabel statistik kesiswaan
  ranking = ranking.filter(item => item !== null);

  // 3. Urutkan dari jumlah Alpa yang paling banyak/tertinggi
  ranking.sort((a, b) => b.alpa - a.alpa);

  // 4. Render output ke dalam struktur tabel visual dashboard kesiswaan
  // (Pertahankan sisa baris kode di bawahnya milik Anda seperti <table>... hingga penutup return `...`)
  return `

          <th class="p-3 text-left">Nama Lengkap / Rombel</th>
          <th class="p-3 text-center w-24">Total Alpa</th>
        </tr>

      <tbody>
        ${ranking.length > 0 ? ranking.slice(0, 10).map((r, i) => `
          <tr class="border-b border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50/50">
            <td class="p-3 text-center font-bold">

    const hasil = hitungPoinSiswa(siswa.id);

    const totalKredit = hasil.totalKredit || 0;
    const totalPelanggaran = hasil.totalPelanggaran || 0;
    const sisaPoin = hasil.sisaPoin || 0;

    // 1. Ambil semua data absensi milik siswa ini
    const logAbsen = (DB.kehadiran || []).filter(
      k => String(k.siswaId) === String(siswa.id)
    );

    // 2. KUNCI PERBAIKAN: Hanya hitung baris yang statusnya SAKIT, IZIN, atau ALPA sebagai tidak hadir
    const tidakHadir = logAbsen.filter(k => {
      if (!k.status) return false;
      const st = String(k.status).toLowerCase().trim();
      return ['sakit', 's', 'izin', 'i', 'alpa', 'a'].includes(st);
    }).length;

    // 3. Ambil total hari aktif dinamis dari sistem
    const hariAktif = getTotalHariAktif();

    // 4. Hitung jumlah hadir riil
    const hadir = Math.max(0, hariAktif - tidakHadir);

    const persenHadir = hariAktif > 0
      ? ((hadir / hariAktif) * 100)
      : 100;

    ranking.push({
      siswa,
      totalKredit,
      totalPelanggaran,
      sisaPoin,
      persenHadir
    });
  });

  // Urutkan berdasarkan sisa poin tertinggi ke terendah
  ranking.sort((a,b) => b.sisaPoin - a.sisaPoin);

  return ranking;
}


// ========================================================
// LOGIC ASSISTANT UNTUK GENERATE GRAFIK SECARA REALTIME (PERBAIKAN SINKRONISASI)
// ========================================================
function idrRenderChartKelas() {
  const ctx = document.getElementById('chartRankingKelas');
  if(!ctx) return;

  // 1. Ambil daftar semua kelas secara dinamis dari database sekolah
  let listKelas = [];
  if (DB.kelas && DB.kelas.length > 0) {
    listKelas = DB.kelas.map(k => String(k).trim());
  } 
  
  // Gabungkan dengan kelas yang ada di data siswa untuk memastikan X ATPH pasti masuk
  if (DB.siswa && DB.siswa.length > 0) {
    const kelasDariSiswa = DB.siswa.map(s => String(s.kelas).trim());
    listKelas = [...new Set([...listKelas, ...kelasDariSiswa])];
  }

  // Jika masih kosong total, gunakan fallback
  if (listKelas.length === 0) {
    listKelas = ['X TKJ 1', 'X TKJ 2', 'XI RPL 1', 'XII MM 1', 'X ATPH'];
  }

  // Urutkan kelas agar rapi (X, XI, XII)
  listKelas.sort();

  // 2. Hitung persentase kehadiran masing-masing kelas secara presisi
  const dataPersen = listKelas.map(k => {
    // Cari semua siswa yang terdaftar di kelas ini
    const siswaDiKelas = (DB.siswa || []).filter(s => 
      String(s.kelas).trim().toLowerCase() === k.toLowerCase()
    );

    // Jika kelas tidak memiliki siswa sama sekali, set chart ke 100% (kosong bersih)
    if (siswaDiKelas.length === 0) return 100;

    // Kumpulkan semua ID siswa di kelas ini
    const daftarIdSiswa = siswaDiKelas.map(s => String(s.id));

    // AMBIL SEMUA LOG ABSENSI BERDASARKAN ID SISWA YANG ADA DI KELAS INI (JAUH LEBIH AMAN DAN AKURAT)
    const logAbsenKelas = (DB.kehadiran || []).filter(h => 
      daftarIdSiswa.includes(String(h.siswaId))
    );
    
    // Jika siswa di kelas ini benar-benar belum pernah diabsen sama sekali oleh sekretaris
    if (logAbsenKelas.length === 0) return 100; 
    
    // Hitung baris yang berstatus HADIR (atau otomatis terisi default 'hadir' di sistem baru Anda)
    const totalHadir = logAbsenKelas.filter(h => {
      const st = String(h.status || '').toUpperCase().trim();
      // Hanya anggap hadir jika statusnya kosong (belum diabsen/default) atau eksplisit berisi HADIR/H
      return st === '' || ['HADIR', 'H', 'MASUK', 'M'].includes(st);
    }).length;

    // Hitung persentase secara aman (pembulatan terdekat) berbanding total log absensi yang masuk
    return Math.min(100, Math.round((totalHadir / logAbsenKelas.length) * 100));
  });

  // 3. Render ulang Chart Batang Kehadiran (Chart.js)
  if (window.charts && window.charts['chartRankingKelas']) {
    window.charts['chartRankingKelas'].destroy();
  }
  if (!window.charts) window.charts = {};

  window.charts['chartRankingKelas'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: listKelas,
      datasets: [{
        label: 'Persentase Kehadiran (%)',
        data: dataPersen,
        backgroundColor: '#3b82f6',
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: { 
        y: { 
          min: 0, 
          max: 100,
          ticks: { callback: function(value) { return value + '%'; } }
        } 
      },
      plugins: { legend: { display: false } }
    }
  });

  // 4. Hitung akumulasi poin kasus pelanggaran per kelas untuk papan peringkat
  const rankKelas = listKelas.map(k => {
    const siswaDiKelas = (DB.siswa || [])
      .filter(s => String(s.kelas).trim().toLowerCase() === k.toLowerCase())
      .map(s => s.id);
    
    const totalPoin = (DB.pelanggaran || []).filter(p => siswaDiKelas.includes(p.siswaId)).reduce((acc, curr) => {
      const idAturan = curr.jenisId || curr.tatatertibId;
      const aturan = (DB.tatatertib || []).find(t => String(t.id).trim() === String(idAturan).trim() || String(t.kode).trim() === String(idAturan).trim());
      return acc + (aturan ? (Number(aturan.poin) || 0) : 0);
    }, 0);
    
    return { namaKelas: k, poin: totalPoin };
  }).sort((a,b) => a.poin - b.poin);

  // 5. Render list ke elemen HTML
  const containerList = document.getElementById('listKelasDisiplin');
  if(containerList) {
    if (rankKelas.length > 0) {
      containerList.innerHTML = rankKelas.map((rk, idx) => {
        let lencana = `<span class="text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">${idx+1}</span>`;
        if (idx === 0) lencana = '<span class="text-lg">🥇</span>';
        if (idx === 1) lencana = '<span class="text-lg">🥈</span>';
        if (idx === 2) lencana = '<span class="text-lg">🥉</span>';

        return `
          <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700/40 rounded-xl border border-gray-100/50 dark:border-gray-600/30">
            <div class="flex items-center gap-3">
              ${lencana}
              <span class="font-semibold text-sm text-gray-800 dark:text-gray-200">${rk.namaKelas}</span>
            </div>
            <span class="px-2.5 py-1 rounded-lg text-xs font-bold ${rk.poin > 30 ? 'bg-red-50 text-red-600 dark:bg-red-900/20' : 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20'}">
              ${rk.poin} Poin Kasus
            </span>
          </div>
        `;
      }).join('');
    } else {
      containerList.innerHTML = `<p class="text-xs text-gray-400 text-center py-6">Belum ada kelas terdaftar</p>`;
    }
  }
}

function idrRenderChartPelanggaran() {
  const ctx = document.getElementById('chartPiePelanggaran');
  if(!ctx) return;

  // 1. Hitung top pelanggaran berdasarkan aturan kesiswaan sekolah
  const hitungAturan = {};
  if (DB.pelanggaran && Array.isArray(DB.pelanggaran)) {
    DB.pelanggaran.forEach(p => {
      // PERBAIKAN: Ambil jenisId terlebih dahulu, jika kosong baru cari tatatertibId
      const idAturanAktif = p.jenisId || p.tatatertibId || 'T00';
      hitungAturan[idAturanAktif] = (hitungAturan[idAturanAktif] || 0) + 1;
    });
  }

  // 2. Petakan ID hasil hitung ke data master DB.tatatertib
  const aturanTerurut = Object.keys(hitungAturan).map(id => {
    // Pencocokan fleksibel berdasarkan id angka maupun kode string kriteria kesiswaan
    const aturanObj = (DB.tatatertib || []).find(t => 
      String(t.id).trim() === String(id).trim() || 
      String(t.kode).trim() === String(id).trim()
    );
    
    return {
      deskripsi: aturanObj ? aturanObj.deskripsi : 'Pelanggaran Lainnya / Kasus Khusus',
      kode: aturanObj ? aturanObj.kode : 'Umum',
      jumlah: hitungAturan[id]
    };
  }).sort((a,b) => b.jumlah - a.jumlah); // Urutkan dari kasus terbanyak

  // 3. Render tabel top 5 aturan ke dalam HTML dashboard
  const tableBody = document.getElementById('tableTopAturan');
  if(tableBody) {
    if (aturanTerurut.length > 0) {
      tableBody.innerHTML = aturanTerurut.slice(0, 5).map(at => `
        <tr class="border-b dark:border-gray-700 text-xs">
          <td class="p-3 font-medium text-gray-700 dark:text-gray-300">
            <span class="font-mono text-primary-500 font-bold mr-1">[${at.kode}]</span> ${at.deskripsi}
          </td>
          <td class="p-3 text-center font-bold text-gray-600 dark:text-gray-200">${at.jumlah} Kali</td>
        </tr>
      `).join('');
    } else {
      tableBody.innerHTML = `<tr><td colspan="2" class="p-4 text-center text-xs text-gray-400">Belum ada data kasus pelanggaran tercatat</td></tr>`;
    }
  }

  // 4. Siapkan data visual untuk diagram lingkaran Chart.js
  const labelsPie = aturanTerurut.slice(0, 4).map(a => a.deskripsi);
  const dataPie = aturanTerurut.slice(0, 4).map(a => a.jumlah);
  
  if(aturanTerurut.length > 4) {
    labelsPie.push('Lain-lain');
    const sisaKasus = aturanTerurut.slice(4).reduce((acc, curr) => acc + curr.jumlah, 0);
    dataPie.push(sisaKasus);
  }

  // Bersihkan chart lama jika sudah ada instansinya agar tidak tumpang tindih
  if (charts['chartPiePelanggaran']) {
    charts['chartPiePelanggaran'].destroy();
  }

  charts['chartPiePelanggaran'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labelsPie.length > 0 ? labelsPie : ['Belum Ada Kasus'],
      datasets: [{
        data: dataPie.length > 0 ? dataPie : [0],
        backgroundColor: ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#94a3b8']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { 
        legend: { 
          position: 'bottom', 
          labels: { boxWidth: 12, font: { size: 10 } } 
        } 
      }
    }
  });
}

function exportDatabaseKeJSON() {
  try {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB, null, 2));
    const downloadAnchor = document.createElement('a');
    const tgl = new Date().toISOString().slice(0, 10);
    
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", `BACKUP_KESISWAAN_${tgl}.json`);
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
    
    if (typeof showToast === 'function') showToast('Database berhasil diexport!', 'success');
    if (typeof addAuditLog === 'function') addAuditLog('Export Database');
  } catch (error) {
    if (typeof showToast === 'function') showToast('Gagal export: ' + error.message, 'error');
  }
}

function importDatabaseDariJSON(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!confirm("⚠️ PERINGATAN: Mengimport data baru akan MENIMPA dan MENGHAPUS seluruh data aktif saat ini. Apakah Anda yakin ingin melanjutkan?")) {
    event.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const dataTerimport = JSON.parse(e.target.result);
      
      // Validasi struktur pengaman data internal aplikasi
      if (!dataTerimport.siswa || !dataTerimport.pelanggaran || !dataTerimport.kehadiran) {
        throw new Error("Struktur file backup tidak dikenali oleh sistem.");
      }
      
      // Terapkan data baru ke database runtime
      DB = dataTerimport;
      
      // Simpan permanen ke Firebase/Storage
      if (typeof simpanDataKeStorage === 'function') simpanDataKeStorage();
      if (typeof addAuditLog === 'function') addAuditLog('Import Database');
      if (typeof showToast === 'function') showToast('Database berhasil dipulihkan!', 'success');
      
      setTimeout(() => {
        window.location.reload();
      }, 1200);
      
    } catch (error) {
      alert("Gagal memproses file JSON: " + error.message);
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

// ==========================================
// LOGIKA ENGINE RESET SEMESTER / PERIODE
// ==========================================
function eksekusiResetPeriode(tipe) {
  let pesanKonfirmasi = "";
  if (tipe === 'semester') {
    pesanKonfirmasi = "Apakah Anda yakin ingin memulai SEMESTER BARU?\nTindakan ini akan MENGHAPUS BERSIH data kehadiran/absen siswa langsung dari database pusat, namun data pelanggaran tetap aman.";
  } else if (tipe === 'periode-baru') {
    pesanKonfirmasi = "⚠️ PERINGATAN BESAR!\nApakah Anda yakin ingin mengganti PERIODE PEMBELAJARAN BARU?\nTindakan ini akan MENGHAPUS TOTAL seluruh data absensi dan pelanggaran di database pusat.";
  }

  if (!confirm(pesanKonfirmasi)) return;
  if (!confirm("Pastikan Anda telah mengunduh berkas JSON sebagai cadangan resmi sekolah sebelum melanjutkan reset data. Lanjutkan?")) return;

  try {
    // 1. Deteksi objek database Firebase secara akurat
    let targetDb = null;
    if (typeof database !== 'undefined') {
      targetDb = database;
    } else if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) {
      targetDb = window.firebase.apps[0].database();
    }

    if (tipe === 'semester') {
      // Kosongkan memori variabel lokal di browser
      DB.kehadiran = [];
      if (DB.absensi) DB.absensi = [];
      
      if (DB.siswa && Array.isArray(DB.siswa)) {
        DB.siswa.forEach(s => {
          s.alpa = 0; s.sakit = 0; s.izin = 0; s.totalAbsen = 0; s.poinAbsen = 0;
        });
      }

      // 🔥 TEMBAK LANGSUNG KE FOLDER LUAR FIREBASE (Bukan kesiswaan_cloud)
      if (targetDb) {
        // Menghapus folder 'kehadiran' yang berdiri mandiri di luar
        targetDb.ref('kehadiran').remove()
          .then(() => console.log("Folder 'kehadiran' di luar berhasil dihapus total."))
          .catch(e => console.error("Gagal menghapus folder luar:", e));
          
        // Bersihkan juga backup poin kesiswaan jika tersimpan di luar/dalam
        targetDb.ref('siswaPoinBackup').remove().catch(() => {});
        targetDb.ref('kesiswaan_cloud/siswaPoinBackup').remove().catch(() => {});
      }
      
      addAuditLog('Reset Kehadiran Semester Baru');
      if (typeof showToast === 'function') showToast('Folder Kehadiran di Firebase luar berhasil dibersihkan!', 'success');

    } else if (tipe === 'periode-baru') {
      // Skenario Reset Total (Tahun Ajaran Baru)
      DB.kehadiran = [];
      if (DB.absensi) DB.absensi = [];
      DB.pelanggaran = [];

      if (DB.siswa && Array.isArray(DB.siswa)) {
        DB.siswa.forEach(s => {
          s.poin = 0; s.poinAbsen = 0; s.poinPelanggaranDasar = 0; s.poinPenebusan = 0;
          s.totalPelanggaran = 0; s.totalAbsen = 0; s.alpa = 0; s.sakit = 0; s.izin = 0;
        });
      }

      // 🔥 HAPUS KEDUA FOLDER: Yang di luar maupun yang kesiswaan_cloud
      if (targetDb) {
        targetDb.ref('kehadiran').remove().catch(() => {});
        targetDb.ref('kesiswaan_cloud/pelanggaran').remove().catch(() => {});
        targetDb.ref('kesiswaan_cloud/siswaPoinBackup').remove().catch(() => {});
        targetDb.ref('siswaPoinBackup').remove().catch(() => {});
      }

      addAuditLog('Reset Total Ganti Periode Pembelajaran');
      if (typeof showToast === 'function') showToast('Seluruh database pusat berhasil di-reset total!', 'success');
    }

    // 2. Sinkronisasikan sisa struktur data kesiswaan lokal ke Firebase
    if (typeof simpanDataKeStorage === 'function') {
      simpanDataKeStorage();
    }

    // Paksa browser menghancurkan sisa cache dan melakukan reload bersih dari server setelah 2.5 detik
    setTimeout(() => {
      window.location.href = window.location.origin + window.location.pathname + '?refresh=' + Date.now();
    }, 2500);

  } catch (error) {
    alert("Terjadi kendala teknis saat berkomunikasi dengan Firebase: " + error.message);
  }
}

  // Bersihkan format nomor agar hanya angka dan diawali dengan 62
  let nomorBersih = String(nomorWa).replace(/[^0-9]/g, '');
  if (nomorBersih.startsWith('0')) {
    nomorBersih = '62' + nomorBersih.slice(1);
  }

  // Lakukan request ke server Fonnte
  fetch('https://api.fonnte.com/send', {
    method: 'POST',
    headers: {
      'Authorization': TOKEN_FONNTE,
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: new URLSearchParams({
      'target': nomorBersih,
      'message': pesan,
      'countryCode': '62'
    })
  })
  .then(response => response.json())
  .then(data => {
    if (data.status) {
      console.log(`WhatsApp berhasil dikirim ke ${nomorBersih}`);
      if (typeof showToast === 'function') showToast('Notifikasi WhatsApp terkirim ke Orang Tua!', 'success');
    } else {
      console.error('Fonnte Error:', data.reason);
    }
  })
  .catch(error => {
    console.error('Gagal mengirim WhatsApp:', error);
  });
}

// Fungsi simpan identitas siswa versi tampilan lama yang disinkronkan ke Firebase
function simpanIdentitasSiswa() {
  const siswaId = document.getElementById('mdlSiswaId').value;
  if (!siswaId) {
    showToast('ID Siswa tidak valid', 'error');
    return;
  }

  const tempatLahir = document.getElementById('mdlTempatLahir').value.trim();
  const tanggalLahir = document.getElementById('mdlTanggalLahir').value;
  const alamat = document.getElementById('mdlAlamat').value.trim();
  const foto = document.getElementById("mdlBase64Foto").value;

  // PASTIKAN tetap berupa Array
  if (!DB.kelengkapanData || !Array.isArray(DB.kelengkapanData)) {
    DB.kelengkapanData = [];
  }
  
  const payloadData = {
    siswaId: siswaId,
    tempatLahir: tempatLahir,
    tanggalLahir: tanggalLahir,
    alamat: alamat,
    foto: foto,
    updatedAt: new Date().toISOString()
  };

  // Cari index di array lokal
  const indexData = DB.kelengkapanData.findIndex(d => String(d.siswaId) === String(siswaId));
  
  if (indexData > -1) {
    DB.kelengkapanData[indexData] = payloadData;
  } else {
    DB.kelengkapanData.push(payloadData);
  }

  showToast('Sedang menyinkronkan data...', 'info');

  // SIMPAN KE FIREBASE SEBAGAI ARRAY/LIST (Gunakan struktur array utuh)
  // Ini akan memperbarui seluruh node kelengkapanData sebagai array di Firebase
  const dbRef = firebase.database().ref('kesiswaan_cloud/kelengkapanData'); 
  
  dbRef.set(DB.kelengkapanData)
    .then(() => {
      showToast('Data Tersimpan ke Firebase!', 'success');
      tutupModalIdentitas();
      renderInputDataPelajar(); 
      if (typeof addAuditLog === 'function') {
        addAuditLog('Update Identitas Siswa ID: ' + siswaId);
      }
    })
    .catch((err) => {
      console.error(err);
      showToast('Gagal menyimpan ke Firebase', 'error');
    });
}

// =========================================================================
// LOGIKA CODES: ENGINE DOWNLOAD TEMPLATE EXCEL PER KELAS
// =========================================================================
function unduhTemplateExcelPelajar() {
  const kelasDipilih = document.getElementById('excelFilterKelas').value;
  let listSiswa = DB.siswa || [];

  if (kelasDipilih) {
    listSiswa = listSiswa.filter(s => String(s.kelas) === String(kelasDipilih));
  }

  if (listSiswa.length === 0) {
    alert("Tidak ada data siswa untuk kelas yang dipilih!");
    return;
  }

  // Format baris kolom data pembentuk Excel
  const dataExcel = listSiswa.map(s => {
    // Ubah format tanggal dari YYYY-MM-DD (Database) menjadi DD-MM-YYYY (Excel)
    let tglLahirExcel = "";
    if (s.tanggalLahir) {
      const parts = s.tanggalLahir.split("-");
      if (parts.length === 3) {
        tglLahirExcel = `${parts[2]}-${parts[1]}-${parts[0]}`; // Menjadi DD-MM-YYYY
      } else {
        tglLahirExcel = s.tanggalLahir;
      }
    }

    return {
      "ID_SISWA": s.id, // Kunci utama penyelarasan data (JANGAN DIUBAH)
      "NAMA SISWA": s.nama,
      "KELAS": s.kelas || '',
      "NISN": s.nisn || '',
      "TEMPAT LAHIR": s.tempatLahir || '',
      "TANGGAL LAHIR (Contoh: 25-05-2008)": tglLahirExcel,
      "ALAMAT TINGGAL": s.alamat || '',
      "PAS FOTO 3x4 (Isi dengan URL/Link)": s.pasFoto || ''
    };
  });

  // Proses Build Workbook menggunakan SheetJS
  const worksheet = XLSX.utils.json_to_sheet(dataExcel);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Template_Pelajar");

  // Atur lebar kolom agar rapi saat dibuka di Excel
  worksheet["!cols"] = [
    { wch: 12 }, { wch: 30 }, { wch: 10 }, { wch: 15 }, { wch: 18 }, { wch: 35 }, { wch: 35 }, { wch: 40 }
  ];

  // Eksekusi Download File ke komputer user
  const namaFile = kelasDipilih ? `Template_Kartu_Pelajar_Kelas_${kelasDipilih}.xlsx` : `Template_Kartu_Pelajar_Semua_Kelas.xlsx`;
  XLSX.writeFile(workbook, namaFile);
}

// =========================================================================
// LOGIKA CODES: ENGINE PARSING / IMPORT MASSAL EXCEL KEMBALI KE DB
// =========================================================================
function bacaFileExcelPelajar(input) {
  if (!input.files || !input.files[0]) return;

  const file = input.files[0];
  const reader = new FileReader();

  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      // Agar tanggal tidak terbaca sebagai nomor seri Excel (seperti 44000), kita paksa baca sebagai text string murni (raw: false)
      const workbook = XLSX.read(data, { type: 'array', cellDates: true, dateNF: 'dd-mm-yyyy' });
      
      const namaSheet = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[namaSheet];
      
      const rowsJson = XLSX.utils.sheet_to_json(worksheet, { raw: false });

      if (rowsJson.length === 0) {
        alert("File Excel kosong atau format tidak sesuai!");
        return;
      }

      let totalTerupdate = 0;

      rowsJson.forEach(row => {
        const idSiswaExcel = row["ID_SISWA"];
        if (!idSiswaExcel) return;

        const siswa = DB.siswa.find(s => String(s.id) === String(idSiswaExcel));
        if (siswa) {
          const tLahir = row["TEMPAT LAHIR"] !== undefined ? String(row["TEMPAT LAHIR"]).trim() : siswa.tempatLahir;
          const almt = row["ALAMAT TINGGAL"] !== undefined ? String(row["ALAMAT TINGGAL"]).trim() : siswa.alamat;
          
          // Ambil Foto jika diisi
          const urlFoto = row["PAS FOTO 3x4 (Isi dengan URL/Link)"];
          if (urlFoto !== undefined && urlFoto.trim() !== '') {
            siswa.pasFoto = String(urlFoto).trim();
          }

          // Proses kembalikan Tanggal dari Excel (DD-MM-YYYY) ke Database Web (YYYY-MM-DD)
          let inputTglExcel = row["TANGGAL LAHIR (Contoh: 25-05-2008)"];
          let tglLahirDB = siswa.tanggalLahir;
          
          if (inputTglExcel !== undefined && inputTglExcel !== '') {
            let strTgl = String(inputTglExcel).trim();
            // Jika ada format garis miring dari Excel (DD/MM/YYYY), ubah ke strip
            strTgl = strTgl.replace(/\//g, '-'); 
            
            if (strTgl.includes("-")) {
              const parts = strTgl.split("-");
              // Jika formatnya benar DD-MM-YYYY (bagian pertama adalah hari / max 2 digit)
              if (parts.length === 3 && parts[0].length <= 2) {
                // Susun ulang menjadi YYYY-MM-DD
                tglLahirDB = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
              } else {
                tglLahirDB = strTgl; // Fallback jika formatnya ternyata sudah YYYY-MM-DD
              }
            } else {
              tglLahirDB = strTgl;
            }
          }

          // Simpan ke object siswa
          siswa.tempatLahir = tLahir;
          siswa.tanggalLahir = tglLahirDB;
          siswa.alamat = almt;
          
          totalTerupdate++;
        }
      });

      if (totalTerupdate > 0) {
        if (typeof simpanDataKeStorage === "function") {
          await simpanDataKeStorage("siswa");
        } else if (typeof simpanKeFirebase === "function") {
          await simpanKeFirebase();
        }

        alert(`Berhasil mengimpor massal! ${totalTerupdate} data biodata siswa terupdate.`);
        renderInputDataPelajar(); // Refresh tabel view
      } else {
        alert("Tidak ada kecocokan ID Siswa. Periksa kembali file template Anda.");
      }

    } catch (err) {
      console.error(err);
      alert("Gagal memproses file Excel. Pastikan Anda menggunakan file Template yang diunduh.");
    }
    
    input.value = ''; // Reset input file picker
  };

  reader.readAsArrayBuffer(file);
}

// 1. Tambahkan kata kunci 'async' di depan fungsi
async function eksekusiSimpanPelajar() {
  // Simpan data ke localStorage atau database Firebase Anda
  if (typeof simpanDataKeStorage === "function") {
    // 2. Tambahkan await dan berikan parameter 'siswa'
    await simpanDataKeStorage("siswa");

function aksiBukaJendelaCetak(siswaId) {
  const siswa = DB.siswa.find(s => String(s.id) === String(siswaId));
  if (!siswa) return;

  // 1. Hubungkan dengan DB.kelengkapanData Array
  const kData = (DB.kelengkapanData || []).find(d => String(d.siswaId) === String(siswa.id));

  // 2. Ambil Aturan Berlaku Hingga otomatis berdasarkan Tingkat Kelas
  const kls = (siswa.kelas || '').toUpperCase();
  const tahunSekarang = new Date().getFullYear();
  let tahunLulus = tahunSekarang;
  if (kls.includes('XII'))      tahunLulus += 1;
  else if (kls.includes('XI'))  tahunLulus += 2;
  else if (kls.includes('X'))   tahunLulus += 3;
  else                          tahunLulus += 3;

  // 3. Ambil Konfigurasi dari Data Identitas Global
  const namaKepsek = DB.identitas?.kepsek || "Nama Kepala Sekolah, M.Pd.";
  const nipKepsek = DB.identitas?.nipKepsek || "NIP. 198203112009031002";
  const logoProvinsiBase64 = DB.identitas?.logoProvinsi || "https://via.placeholder.com/100?text=PROV"; 
  const logoSekolahBase64 = DB.identitas?.logoSekolah || "https://via.placeholder.com/100?text=LOGO"; 
  const capStempelBase64 = DB.identitas?.capSekolah || ""; 
  const ttdKepsekBase64 = DB.identitas?.ttdKepsek || ""; 

  // 4. Fallback Data dari kelengkapanData atau Objek Siswa Utama
  const fotoSiswa = kData && kData.foto ? kData.foto : (siswa.pasFoto || siswa.foto || "https://via.placeholder.com/150?text=No+Foto");
  const alamat = kData && kData.alamat ? kData.alamat : (siswa.alamat || '-');
  
  // Fungsi pembantu format tanggal lahir Indonesia (DD Nama_Bulan YYYY)
  const formatTanggalLahirIndonesia = (tglStr) => {
    if (!tglStr || tglStr === '-') return '-';
    const parts = tglStr.split('-');
    if (parts.length === 3 && parts[0].length === 4) {
      const tahun = parts[0];
      const bulan = parts[1];
      const tanggal = parseInt(parts[2], 10);
      const namaBulan = [
        'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
      ];
      const idxBulan = parseInt(bulan, 10) - 1;
      if (idxBulan >= 0 && idxBulan < 12) return `${tanggal} ${namaBulan[idxBulan]} ${tahun}`;
    }
    return tglStr;
  };

  const tglLahirTerformat = formatTanggalLahirIndonesia(kData && kData.tanggalLahir ? kData.tanggalLahir : siswa.tanggalLahir);
  const tempatLahir = kData && kData.tempatLahir ? kData.tempatLahir : (siswa.tempatLahir || '-');
  const ttl = tempatLahir + ', ' + tglLahirTerformat;

  // 5. Mulai membuat dokumen cetak tunggal di tab baru
  const win = window.open('', '_blank');
  
  win.document.write(`

function aksiBukaJendelaCetakMassal(filterKelas = "SEMUA") {

    daftarSiswa = DB.siswa.filter(s => (s.kelas || '').toUpperCase() === filterKelas.toUpperCase());
  }

  if (daftarSiswa.length === 0) {
    alert("Tidak ada data siswa untuk kelas yang dipilih!");
    return;

  // 2. Ambil Konfigurasi dari Data Identitas Global
  const namaKepsek = DB.identitas?.kepsek || "Nama Kepala Sekolah, M.Pd.";
  const nipKepsek = DB.identitas?.nipKepsek || "NIP. 198203112009031002";

  const ttdKepsekBase64 = DB.identitas?.ttdKepsek || ""; 

  // Fungsi pembantu format tanggal lahir Indonesia (DD Nama_Bulan YYYY)
  const formatTanggalLahirIndonesia = (tglStr) => {
    if (!tglStr || tglStr === '-') return '-';
    const parts = tglStr.split('-');
    if (parts.length === 3 && parts[0].length === 4) {
      const tahun = parts[0];
      const bulan = parts[1];
      const tanggal = parseInt(parts[2], 10);
      const namaBulan = [
        'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
      ];
      const idxBulan = parseInt(bulan, 10) - 1;
      if (idxBulan >= 0 && idxBulan < 12) return `${tanggal} ${namaBulan[idxBulan]} ${tahun}`;
    }
    return tglStr;
  };

function getTanggalHariIni() {
    const sekarang = new Date();

    const tahun = sekarang.getFullYear();
    const bulan = String(sekarang.getMonth() + 1).padStart(2, "0");
    const hari = String(sekarang.getDate()).padStart(2, "0");

    return `${tahun}-${bulan}-${hari}`;
}

let tanggalTerakhir = getTanggalHariIni();

setInterval(() => {

    const sekarang = getTanggalHariIni();

    if (sekarang !== tanggalTerakhir) {

        tanggalTerakhir = sekarang;

        const ipTanggal = document.getElementById("ipTanggal");

        if (ipTanggal) {
            ipTanggal.value = sekarang;
        }

        showToast("Tanggal pelanggaran diperbarui ke hari ini.", "success");
    }

}, 60000);

function lihatDetailPelanggaran(idSiswa){

    const siswa = DB.siswa.find(s=>String(s.id)==String(idSiswa));

    if(!siswa){
        showToast("Data siswa tidak ditemukan","danger");
        return;
    }

// ==========================
// RIWAYAT PELANGGARAN
// ==========================
const daftar = (DB.pelanggaran || []).filter(p =>
    String(p.siswaId) === String(idSiswa) ||
    String(p.idSiswa) === String(idSiswa)
);

// ==========================
// SATUKAN RIWAYAT
// ==========================
let riwayat = [];

// --------------------------
// PELANGGARAN
// --------------------------
daftar.forEach(p => {

    let poin = parseFloat(p.poin) || 0;

    if (DB.tatatertib) {

        const tt = DB.tatatertib.find(t =>

            String(t.id) === String(p.jenisId) ||

            String(t.kode) === String(p.jenisId) ||

            String(t.id) === String(p.tatatertibId)

        );

        if (tt) poin = parseFloat(tt.poin) || 0;
    }

    riwayat.push({

        tanggal: p.tanggal,

        jenis: "Pelanggaran",

        detail: p.jenisNama || p.namaPelanggaran || p.jenis || "-",

        poin: poin,

        petugas: p.namaGuru || p.guru || "-",

        keterangan: p.keterangan || "-"

    });

});

// --------------------------
// KETIDAKHADIRAN
// --------------------------
(DB.kehadiran || [])

.filter(k =>
    String(k.siswaId) === String(idSiswa) &&
    ["alpa","a","izin","i","sakit","s"].includes(
        String(k.status).toLowerCase()
    )
)

.forEach(k => {

    let poin = 0;

    let status = String(k.status).toLowerCase();

    if (status === "alpa" || status === "a")
        poin = 3;

    else if (status === "izin" || status === "i")
        poin = 1;

    else if (status === "sakit" || status === "s")
        poin = 0.5;

    riwayat.push({

        tanggal: k.tanggal,

        jenis: "Ketidakhadiran",

        detail: status.toUpperCase(),

        poin: poin,

        petugas: "Sekretaris",

        keterangan: "-"

    });

});

// ==========================
// URUTKAN BERDASARKAN TANGGAL
// ==========================
riwayat.sort((a,b)=>

    new Date(b.tanggal)-new Date(a.tanggal)

);

// ==========================
// BUAT HTML
// ==========================
let html = "";

riwayat.forEach(r=>{

    const badge =
        r.jenis==="Pelanggaran"

        ? '<span class="px-2 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold">Pelanggaran</span>'

        : '<span class="px-2 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs font-semibold">Ketidakhadiran</span>';

    html += `

<tr class="border-b hover:bg-gray-50 dark:hover:bg-gray-700">

<td class="px-3 py-2">

${formatTanggalIndonesia(r.tanggal)}

</td>

<td class="px-3 py-2">

${badge}

</td>

<td class="px-3 py-2">

${r.detail}

</td>

<td class="px-3 py-2 text-center font-bold">

${r.poin}

</td>

<td class="px-3 py-2">

${r.petugas}

</td>

<td class="px-3 py-2">

${r.keterangan}

</td>

</tr>

`;

});

if(html===""){

    html=`

<tr>

<td colspan="6" class="text-center py-6">

Belum ada riwayat.

</td>

</tr>

`;

}

    const modal = document.createElement("div");

    modal.id = "modalDetailPelanggaran";

    modal.className =

    modal.innerHTML = `

<div class="bg-white dark:bg-gray-800 rounded-2xl w-[95%] max-w-5xl max-h-[90vh] overflow-hidden">

function formatTanggalIndonesia(tanggal){

    if(!tanggal) return "-";

    const d = new Date(tanggal);

    return d.toLocaleDateString("id-ID",{
        day:"2-digit",
        month:"long",
        year:"numeric"
    });

}
