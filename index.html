// Mengecek apakah seluruh node sudah selesai dimuat
function cekFirebaseReady() {

  FirebaseState.ready =
    Object.values(FirebaseState.loaded).every(v => v === true);

  if (FirebaseState.ready) {
    console.log("✅ Firebase siap digunakan");
  }

  return FirebaseState.ready;
}

// Menandai sebuah node selesai dimuat
function nodeLoaded(node) {

  if (!(node in FirebaseState.loaded)) return;

  FirebaseState.loaded[node] = true;

  cekFirebaseReady();

}

function loadNode(nodeName, callback) {

  getNode(nodeName).on("value", (snapshot) => {

    let data = snapshot.val();

    callback(data);

    nodeLoaded(nodeName);

  }, (err) => {

    console.error("Gagal memuat node:", nodeName, err);

  });

}

function hitungUlangSemuaPoin() {

  if (!Array.isArray(DB.siswa)) return;

  DB.siswa.forEach(s => {

    const logAbsenSiswa = (DB.kehadiran || []).filter(
      k => String(k.siswaId) === String(s.id)
    );

    const skt = logAbsenSiswa.filter(k =>
      ['sakit', 's', 'SAKIT'].includes(String(k.status).trim())
    ).length;

    const izn = logAbsenSiswa.filter(k =>
      ['izin', 'i', 'IZIN'].includes(String(k.status).trim())
    ).length;

    const alp = logAbsenSiswa.filter(k =>
      ['alpa', 'a', 'ALPA'].includes(String(k.status).trim())
    ).length;

    const poinKetidakhadiran =
      (alp * 3) +
      (izn * 1) +
      (skt * 0.5);

    let poinTataTertib = 0;

    (DB.pelanggaran || []).forEach(p => {

      if (
        String(p.siswaId) !== String(s.id) &&
        String(p.idSiswa) !== String(s.id)
      ) return;

      const tt = (DB.tatatertib || []).find(x =>
        String(x.id) === String(p.jenisId) ||
        String(x.kode) === String(p.jenisId) ||
        String(x.id) === String(p.tatatertibId)
      );

      poinTataTertib += tt
        ? (parseInt(tt.poin) || 0)
        : (parseInt(p.poin) || parseInt(p.skor) || 0);

    });

    let poinPenebusan = 0;

    (DB.penebusan_poin || []).forEach(p => {

      if (String(p.siswaId) !== String(s.id)) return;

      poinPenebusan += parseInt(p.poinPemulihan) || 0;

    });

    s.poinAbsen = poinKetidakhadiran;
    s.poinPelanggaranDasar = poinTataTertib;
    s.poinPenebusan = poinPenebusan;

    s.poin = Math.max(
      0,
      poinKetidakhadiran +
      poinTataTertib -
      poinPenebusan
    );

  });

}

    let targetDb = null;

  if (typeof database !== 'undefined') {

  } else if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) {

    kelas: DB.kelas,

    pelanggaran: DB.pelanggaran,
    kehadiran: DB.kehadiran,
    hariAktif: DB.hariAktif,

    bimbingan: DB.bimbingan,
    kelengkapanData: DB.kelengkapanData,
    auditLog: DB.auditLog,
    identitas: DB.identitas
  };

  if (!(node in dataNode)) {
    console.error("Node tidak dikenal :", node);
    return false;
  }

  await targetDb.ref("kesiswaan_cloud/" + node).set(dataNode[node]);

  return true;
}

function exportDatabaseKeJSON() {
  try {
    // Ambil data utuh dari object DB sistem Anda
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB, null, 2));
    
    // Buat elemen download tak terlihat
    const downloadAnchor = document.createElement('a');
    
    // Format nama file berdasarkan tanggal hari ini: BACKUP_KESISWAAN_2026-06-25.json
    const tgl = new Date().toISOString().slice(0, 10);
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", `BACKUP_KESISWAAN_${tgl}.json`);
    
    // Jalankan klik download otomatis
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
    
    showToast('Database berhasil diexport ke file JSON!', 'success');
    addAuditLog('Export Database');
  } catch (error) {
    showToast('Gagal mengexport database: ' + error.message, 'error');
  }
}

// ==========================================
// FITUR BACKUP: IMPORT DATABASE DARI JSON
// ==========================================
function importDatabaseDariJSON(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!confirm("⚠️ PERINGATAN: Mengimport data baru akan MENIMPA dan MENGHAPUS seluruh data aktif saat ini. Apakah Anda yakin ingin melanjutkan?")) {
    event.target.value = ''; // Reset input file jika batal
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const dataTerimport = JSON.parse(e.target.result);
      
      // Validasi sederhana untuk memastikan yang diupload adalah struktur database aplikasi Anda
      if (!dataTerimport.siswa || !dataTerimport.pelanggaran || !dataTerimport.kehadiran) {
        throw new Error("Struktur file backup tidak valid. Pastikan file JSON bersumber dari fitur Export sistem ini.");
      }
      
      // Timpa database aktif dengan data hasil import
      DB = dataTerimport;
      
      // Simpan perubahan permanen ke Firebase / LocalStorage
      simpanDataKeStorage();
      addAuditLog('Import Database');
      
      showToast('Database Berhasil Dipulihkan!', 'success');
      
      // Muat ulang halaman agar UI membaca data yang baru diimport
      setTimeout(() => {
        window.location.reload();
      }, 1500);
      
    } catch (error) {
      alert("Gagal memproses file JSON: " + error.message);
      event.target.value = ''; // Reset input
    }
  };
  
  reader.readAsText(file);
}

function toggleMinimizeSidebar() {
  // BENTENG PENGAMAN: Jika dibuka di HP (layar < 1024px), abaikan fungsi minimize ini
  if (window.innerWidth < 1024) return;

  const sb = document.getElementById('sidebar');
  const header = document.getElementById('sidebarHeader');
  const minimizeBtn = document.getElementById('minimizeBtn');
  const isMinimized = sb.classList.contains('sidebar-minimized');

  if (isMinimized) {
    // Restore
    sb.classList.remove('sidebar-minimized', 'w-16');
    sb.classList.add('w-64');
    if (header) header.classList.remove('hidden');
    if (minimizeBtn?.querySelector('i')) minimizeBtn.querySelector('i').setAttribute('data-lucide', 'chevron-left');
    document.querySelectorAll('.sidebar-label').forEach(el => el.classList.remove('hidden'));
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('justify-center', 'px-2'));
    localStorage.setItem('sidebar-minimized', 'false');
  } else {
    // Minimize
    sb.classList.add('sidebar-minimized', 'w-16');
    sb.classList.remove('w-64');
    if (header) header.classList.add('hidden');
    if (minimizeBtn?.querySelector('i')) minimizeBtn.querySelector('i').setAttribute('data-lucide', 'chevron-right');
    document.querySelectorAll('.sidebar-label').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.add('justify-center', 'px-2'));
    localStorage.setItem('sidebar-minimized', 'true');
  }
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (!sb) return;

  const isHidden = sb.classList.contains('-translate-x-full');

  // Jika dibuka di HP, pastikan mode perkecil/minimize dibatalkan agar layout tidak rusak
  if (window.innerWidth < 1024) {
    sb.classList.remove('sidebar-minimized', 'w-16');
    sb.classList.add('w-64');
    const header = document.getElementById('sidebarHeader');
    if (header) header.classList.remove('hidden');
    document.querySelectorAll('.sidebar-label').forEach(el => el.classList.remove('hidden'));
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('justify-center', 'px-2'));
  }

  if (isHidden) {
    // OPEN SIDEBAR (Mobile Mode)
    sb.classList.remove('-translate-x-full');
    if (overlay) overlay.classList.remove('hidden');
  } else {
    // CLOSE SIDEBAR (Mobile Mode)
    sb.classList.add('-translate-x-full');
    if (overlay) overlay.classList.add('hidden');
  }
}

function jalankanFilterRekapSiswa() {
  const filterKelas = document.getElementById('filterKelasRekap').value;
  const kataKunci = document.getElementById('searchSiswaRekap').value.toLowerCase().trim();

  // 1. Proses kompilasi data pelanggaran per siswa
  let rekapSiswa = (DB.siswa || []).map(s => {
    const listPelanggaran = (DB.pelanggaran || []).filter(p => {
      return String(p.siswaId) === String(s.id) || String(p.idSiswa) === String(s.id);
    });

    let totalPoin = 0;
    listPelanggaran.forEach(p => {
      const tt = DB.tatatertib.find(x => String(x.id) === String(p.jenisId) || String(x.kode) === String(p.jenisId) || String(x.id) === String(p.tatatertibId));
      const poinFinal = tt ? (parseInt(tt.poin) || 0) : (parseInt(p.poin) || parseInt(p.skor) || 0);
      totalPoin += poinFinal;
    });

    return {
      id: s.id,
      nama: s.nama,
      nisn: s.nisn || '-',
      kelas: s.kelas,
      jumlahKasus: listPelanggaran.length,
      totalPoin: totalPoin
    };
  });

  if (filterKelas) {
    rekapSiswa = rekapSiswa.filter(r => r.kelas === filterKelas);
  }

  if (kataKunci) {
    rekapSiswa = rekapSiswa.filter(r => r.nama.toLowerCase().includes(kataKunci) || r.nisn.includes(kataKunci));
  }

  rekapSiswa.sort((a, b) => b.totalPoin - a.totalPoin);

  const tbody = document.getElementById('bodyRekapPelanggaranSiswa');
  if (rekapSiswa.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="py-8 text-center text-gray-400 italic">Tidak ada data rekapitulasi siswa yang sesuai filter.</td></tr>`;
    return;
  }

  tbody.innerHTML = rekapSiswa.map((r, index) => {
    let warnaPoin = 'text-gray-700 dark:text-gray-300 font-semibold';
    if (r.totalPoin >= 75) warnaPoin = 'text-red-600 dark:text-red-400 font-bold';
    else if (r.totalPoin >= 40) warnaPoin = 'text-amber-600 dark:text-amber-400 font-bold';

    return `
      <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-700/20 transition">
        <td class="py-3.5 px-6 text-center font-medium text-gray-400">${index + 1}</td>
        <td class="py-3.5 px-6 font-bold text-gray-900 dark:text-white">${r.nama}</td>
        <td class="py-3.5 px-6 font-mono text-xs text-gray-500">${r.nisn}</td>
        <td class="py-3.5 px-6 text-center"><span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded-lg text-xs font-medium">${r.kelas}</span></td>
        <td class="py-3.5 px-6 text-center font-medium text-gray-600 dark:text-gray-400">${r.jumlahKasus} Kali</td>
        <td class="py-3.5 px-6 text-center ${warnaPoin}">${r.totalPoin} Pts</td>
        <td class="py-3.5 px-6 text-center">
          <button onclick="lihatDetailPelanggaranSiswa('${r.id}')" 
            class="px-3 py-1.5 bg-primary-50 hover:bg-primary-100 dark:bg-primary-900/30 dark:hover:bg-primary-900/50 text-primary-600 dark:text-primary-400 text-xs font-semibold rounded-xl transition flex items-center gap-1 mx-auto">
            🔍 Detail
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

    return String(p.siswaId) === String(siswaId) || String(p.idSiswa) === String(siswaId);
  });

  document.getElementById('modalNamaSiswa').textContent = `Riwayat Pelanggaran: ${s.nama}`;
  document.getElementById('modalInfoSiswa').textContent = `Kelas: ${s.kelas} | NISN: ${s.nisn || '-'}`;

  const tbodyDetail = document.getElementById('bodyDetailPelanggaranSiswa');
  if (listPelanggaran.length === 0) {
    tbodyDetail.innerHTML = `<tr><td colspan="5" class="p-4 text-center italic text-gray-400">Anak ini belum memiliki catatan pelanggaran resmi.</td></tr>`;
  } else {
    tbodyDetail.innerHTML = listPelanggaran.map((p, index) => {
      const tt = DB.tatatertib.find(x => String(x.id) === String(p.jenisId) || String(x.kode) === String(p.jenisId) || String(x.id) === String(p.tatatertibId));
      const deskripsiFinal = tt ? (tt.deskripsi || tt.jenis) : (p.jenisLog || p.pelanggaran || p.keterangan || 'Pelanggaran Manual');
      const poinFinal = tt ? (parseInt(tt.poin) || 0) : (parseInt(p.poin) || 0);
      
      return `
        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">

        <td class="p-3 text-center text-gray-400">
        ${index+1}
        </td>

        <td class="p-3">
        ${p.tanggal || "-"}
        </td>

        <td class="p-3 font-medium">
        ${deskripsiFinal}
        </td>

        <td class="p-3 text-center text-red-500 font-bold">
        ${poinFinal}
        </td>

        ${p.guru || p.petugas || "Sistem"}

        <button
        onclick="hapusPelanggaranAdmin('${p.id}','${s.nama}')"

        🗑 Hapus

        </button>

        </td>

        </tr>
        `;

    }).join('');
  }

  document.getElementById('modalDetailSiswa').classList.remove('hidden');
}

function cetakRekapPelanggaranPerKelas() {
  // 1. Dapatkan daftar kelas unik terurut
  const daftarKelas = [...new Set((DB.siswa || []).map(s => s.kelas))].sort();
  
  if (daftarKelas.length === 0) {
    alert("Belum ada data siswa untuk dicetak!");
    return;
  }

  const namaSekolah = DB.identitas?.namaSekolah || "SMK NEGERI 1 MEPANGA";
  const alamatSekolah = DB.identitas?.alamat || "Kabupaten Parigi Moutong";

  // 2. Bangun HTML halaman print preview
  let htmlKontenCetak = "";

  daftarKelas.forEach((namaKelas) => {
    // Ambil siswa yang berada di kelas ini
    let siswaDiKelas = (DB.siswa || []).filter(s => s.kelas === namaKelas);

    // Hitung total poin akumulasi untuk masing-masing siswa di kelas ini
    let dataKompilasiSiswa = siswaDiKelas.map(s => {
      const listPelanggaran = (DB.pelanggaran || []).filter(p => {
        return String(p.siswaId) === String(s.id) || String(p.idSiswa) === String(s.id);
      });

      let totalPoin = 0;
      listPelanggaran.forEach(p => {
        const tt = DB.tatatertib.find(x => String(x.id) === String(p.jenisId) || String(x.kode) === String(p.jenisId) || String(x.id) === String(p.tatatertibId));
        const poinFinal = tt ? (parseInt(tt.poin) || 0) : (parseInt(p.poin) || parseInt(p.skor) || 0);
        totalPoin += poinFinal;
      });

      return { nama: s.nama, kelas: s.kelas, totalPoin: totalPoin };
    });

    // Urutkan berdasarkan nama siswa secara alfabetis (atau berdasarkan poin tertinggi: b.totalPoin - a.totalPoin)
    dataKompilasiSiswa.sort((a, b) => a.nama.localeCompare(b.nama));

    // Bangun satu tabel khusus kelas ini
    htmlKontenCetak += `
      <div class="halaman-kelas" style="page-break-after: always; margin-bottom: 40px;">
        <h3 style="font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 4px;">
          DAFTAR REKAPITULASI POIN PELANGGARAN - KELAS: ${namaKelas}
        </h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
          <thead>
            <tr>
              <th style="border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold; background-color: #f2f2f2; width: 8%;">No</th>
              <th style="border: 1px solid #000; padding: 6px; text-align: left; font-weight: bold; background-color: #f2f2f2; width: 52%;">NAMA SISWA</th>
              <th style="border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold; background-color: #f2f2f2; width: 20%;">KELAS</th>
              <th style="border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold; background-color: #f2f2f2; width: 20%;">TOTAL POIN</th>
            </tr>
          </thead>
          <tbody>
            ${dataKompilasiSiswa.map((s, index) => `
              <tr>
                <td style="border: 1px solid #000; padding: 6px; text-align: center;">${index + 1}</td>
                <td style="border: 1px solid #000; padding: 6px; font-weight: bold;">${s.nama}</td>
                <td style="border: 1px solid #000; padding: 6px; text-align: center;">${s.kelas}</td>
                <td style="border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold; ${s.totalPoin > 0 ? 'color: red;' : ''}">${s.totalPoin} Pts</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  });

  // 3. Gabungkan struktur penuh dokumen cetak dengan KOP Sekolah standar resmi Anda
  const dokumenFinal = `
    <!DOCTYPE html>
    <html>
    <head>
      <title>Cetak Rekap Pelanggaran Per Kelas</title>
      <style>
        body { font-family: sans-serif; margin: 20px; color: #000; background-color: #fff; }
        .kop { text-align: center; margin-bottom: 15px; }
        .kop h1 { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .kop h2 { font-size: 13px; font-weight: bold; margin: 0; text-transform: uppercase; }
        .kop p { font-size: 10px; font-style: italic; margin: 3px 0 0 0; }
        .garis { border-bottom: 4px double black; margin-top: 5px; margin-bottom: 20px; }
        .editor-box { background: #f8fafc; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .editor-box button { background: #2563eb; color: #fff; border: none; padding: 6px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        @media print {
          .no-print { display: none !important; }
          body { margin: 10px; }
          .halaman-kelas { page-break-after: always; }
        }
      </style>
    </head>
    <body>
      <div class="editor-box no-print">
        <button onclick="window.print()">Cetak Dokumen Sekarang</button>
        <button style="background: #64748b;" onclick="window.close()">Tutup Halaman</button>
      </div>
      
      <div class="kop">
        <h2>PEMERINTAH PROVINSI SULAWESI TENGAH</h2>
        <h1>${namaSekolah}</h1>
        <p>Alamat : ${alamatSekolah}</p>
      </div>
      <div class="garis"></div>

      ${htmlKontenCetak}
    </body>
    </html>
  `;

  // 4. Eksekusi buka jendela pop-up print browser baru
  const jendelaprint = window.open('', '_blank');
  if (jendelaprint) {
    jendelaprint.document.write(dokumenFinal);
    jendelaprint.document.close();
  } else {
    alert("Gagal mencetak rekap! Pop-up browser Anda terblokir, mohon izinkan akses pop-up sistem.");
  }
}

      const bulanDipilih = parseInt(document.getElementById('filterBulanCetak').value);
      const tahunDipilih = parseInt(document.getElementById('filterTahunCetak').value);
      const kelasTerpilih = document.getElementById('filterKelasAbsen').value || 'Semua Kelas';

      const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

      let daftarSiswa = [...DB.siswa];
      if (document.getElementById('filterKelasAbsen').value) {
        daftarSiswa = daftarSiswa.filter(s => s.kelas === document.getElementById('filterKelasAbsen').value);

      let barisTabelCetak = '';
      let no = 1;

      daftarSiswa.forEach(s => {
        let sSakit = 0, sIzin = 0, sAlfa = 0, sPoin = 0;

        const logBulanIni = (DB.kehadiran || []).filter(k => {
          if (String(k.siswaId) !== String(s.id)) return false;
          const d = new Date(k.tanggal);
          return (d.getMonth() + 1) === bulanDipilih && d.getFullYear() === tahunDipilih;

        logBulanIni.forEach(l => {

          if (st === 'A' || st === 'ALFA') { sAlfa++; sPoin += 3; }
          else if (st === 'I' || st === 'IZIN') { sIzin++; sPoin += 1; }
          else if (st === 'S' || st === 'SAKIT') { sSakit++; sPoin += 0.5; }

        barisTabelCetak += `

    const kredit = (DB.kreditPoin || []).filter(k => String(k.siswaId) === String(siswa.id));
    const totalKredit = hasil.totalKredit || kredit.reduce((a, b) => a + (b.poin || 0), 0);
    
    const totalPelanggaran = hasil.totalPelanggaran || (DB.pelanggaran || [])

      ['ALPA', 'ALFA', 'A'].includes(String(k.status || '').toUpperCase())

    const totalAkhir = hasil.sisaPoin !== undefined ? hasil.sisaPoin : (totalKredit - totalPelanggaran);

    return {

      totalKredit,
      totalPelanggaran,
      totalAbsen,
      totalAkhir
    };

function showModalPreviewKredit(siswaId) {
  const siswa = DB.siswa.find(s => String(s.id) === String(siswaId));

  if (!siswa) {
    showToast('Data siswa tidak ditemukan', 'danger');
    return;
  }

  // 1. AMBIL DATA KREDIT (POSITIF) DAN PELANGGARAN (NEGATIF)
  const kredit = (DB.kreditPoin || []).filter(k => String(k.siswaId) === String(siswaId));
  const pelanggaran = (DB.pelanggaran || []).filter(p => String(p.siswaId) === String(siswaId));
  
  const hasil = typeof hitungPoinSiswa === 'function' ? hitungPoinSiswa(siswaId) : { totalKredit: 0, totalPelanggaran: 0, sisaPoin: 100 };

  const totalKredit = hasil.totalKredit;
  const totalPelanggaran = hasil.totalPelanggaran;
  const sisaPoin = hasil.sisaPoin; // Kasus Said: 67

  // 2. DATA KEHADIRAN & HARI AKTIF SINKRONISASI KESISWAAN
  const logSiswa = (DB.kehadiran || []).filter(k => {
    const idDariAbsen = k.siswaId || k.id_siswa || k.siswa_id;
    return String(idDariAbsen) === String(siswaId);
  });

  const izin = logSiswa.filter(k => ['IZIN', 'I'].includes(String(k.status || '').toUpperCase().trim())).length;
  const sakit = logSiswa.filter(k => ['SAKIT', 'S'].includes(String(k.status || '').toUpperCase().trim())).length;
  const alpa = logSiswa.filter(k => ['ALPA', 'ALFA', 'A'].includes(String(k.status || '').toUpperCase().trim())).length;

  let hariAktifBelajar = logSiswa.length; 
  const hariAktifSekolah = typeof hitungHariAktifSekolah === 'function' ? hitungHariAktifSekolah() : 0;
  
  const totalTidakHadir = izin + sakit + alpa;
  let totalHadir = 0;
  let persentaseKehadiran = "0.0";

  if (hariAktifBelajar > 0) {
    totalHadir = Math.max(0, hariAktifBelajar - totalTidakHadir);
    persentaseKehadiran = ((totalHadir / hariAktifBelajar) * 100).toFixed(1);
  } else if (hariAktifSekolah > 0) {
    totalHadir = hariAktifSekolah;
    hariAktifBelajar = hariAktifSekolah; 
    persentaseKehadiran = "100.0";
  }
    
 // ====================================================
  // 3. SINKRONISASI LOGIKA STATUS (Poin Awal 0, Pelanggaran = Minus)
  // ====================================================
  let statusText = 'SISWA DALAM KATEGORI AMAN';
  let statusColor = 'text-green-600 bg-green-50 border-green-200 dark:bg-green-950/20 dark:border-green-900/50 dark:text-green-400';

  // Asumsi variabel sisaPoin didapat dari: 0 - totalPoinPelanggaran (Contoh: -33)
  // Nilai semakin kecil (semakin minus/negatif) berarti pelanggaran semakin berat.
  
  if (sisaPoin <= -100) {
    statusText = '🚨 KRITIS (TERANCAM DO)';
    statusColor = 'text-red-700 bg-red-100 border-red-300 dark:bg-red-950/40 dark:border-red-900 dark:text-red-400';
  } else if (sisaPoin <= -75) {
    statusText = '⚠️ BIMBINGAN WAKASIS (SP 2)';
    statusColor = 'text-red-600 bg-red-50 border-red-200 dark:bg-red-950/20 dark:border-red-900/50 dark:text-red-400';
  } else if (sisaPoin <= -50) {
    statusText = 'REKOMENDASI BK';
    statusColor = 'text-orange-600 bg-orange-50 border-orange-200 dark:bg-amber-950/20 dark:border-amber-900/50 dark:text-amber-400';
  } else if (sisaPoin <= -25) {
    statusText = 'BIMBINGAN WALI KELAS (T2: KUNJUNGAN RUMAH)';
    statusColor = 'text-yellow-600 bg-yellow-50 border-yellow-200 dark:bg-yellow-950/20 dark:border-yellow-900/50 dark:text-yellow-400';

      </tr>`).join('');

  // 5. GENERATE BARIS TABEL RIWAYAT PELANGGARAN (PELANGGARAN -)

    ? `<tr><td colspan="5" style="text-align:center; padding:12px; color:#94a3b8; font-style:italic;">Bersih dari pelanggaran. Siswa berperilaku sangat baik.</td></tr>`

        <td style="padding:8px; text-align:center;">${i + 1}</td>
        <td style="padding:8px; font-family:monospace; color:#475569;">${p.tanggal || '-'}</td>

        <td style="padding:8px; text-align:right; font-weight:bold; color:#dc2626;">-${p.poin}</td>
      </tr>`).join('');

  // 6. STRUKTUR HTML PRINT OUT PREMIUM (TAB BARU)

    function filterCariSiswaCP(){

    const kata=
        document
        .getElementById("searchCP")
        .value
        .toLowerCase();
    console.log("Kata:", kata);
    console.log("Contoh siswa:", DB.siswa[0]);

    const hasil=
        document
        .getElementById("hasilCariCP");

    if(kata===""){

        hasil.classList.add("hidden");
        hasil.innerHTML="";
        return;

    }

    let data=[...DB.siswa];

    data.sort((a,b)=>{

        const kelas=a.kelas.localeCompare(
            b.kelas,
            'id',
            {numeric:true}
        );

        if(kelas!==0) return kelas;

        return a.nama.localeCompare(
            b.nama,
            'id'
        );

    });

    data = data.filter(s => {

    const nama = String(s.nama || "")
        .trim()
        .toLowerCase();

    const nisn = String(s.nisn || "")
        .trim()
        .toLowerCase();

    const kelas = String(s.kelas || "")
        .trim()
        .toLowerCase();

    return (
        nama.includes(kata.trim()) ||
        nisn.includes(kata.trim()) ||
        kelas.includes(kata.trim())
    );

});
if (data.length === 0) {

    hasil.innerHTML = `
        <div class="px-4 py-3 text-gray-500 text-sm">
            Data tidak ditemukan
        </div>

    hasil.classList.remove("hidden");
    return;

}

    function generateSuratCP() {
      const sid = document.getElementById('cariSiswaCP').value;
      if (!sid) { showToast('Pilih siswa terlebih dahulu', 'error'); return; }
      const s = DB.siswa.find(x => x.id == sid);
      if (!s) { showToast('Siswa tidak ditemukan', 'error'); return; }

      const pel = DB.pelanggaran.filter(p => p.siswaId == sid).map(p => {
        const tt = DB.tatatertib.find(t => t.id === p.jenisId || t.id === p.tatatertibId);
        return {
          tanggal: p.tanggal || '12/01/2026',
          jenis: tt ? (tt.deskripsi || tt.jenis) : (p.pelanggaran || 'Pelanggaran Aturan'),
          ket: 'Tata Tertib',
          poin: tt ? parseInt(tt.poin) : (parseInt(p.poin) || 5)
        };
      });

      const kh = DB.kehadiran.filter(k => k.siswaId == sid && k.status !== 'hadir').map(k => {
        let pt = k.status === 'alpa' ? 3 : k.status === 'izin' ? 1 : 0.5;

          tanggal: k.tanggal || '15/01/2026',
          jenis: 'Ketidakhadiran Kelas (Status: ' + k.status.toUpperCase() + ')',
          ket: 'Absensi',
          poin: pt

    function editKelas(nama) { showFormKelas(nama); }
    async function saveKelas(oldNama) {
      const newNama = document.getElementById('fkNama').value.trim();
      if (!newNama) { showToast('Masukkan nama kelas', 'error'); return; }

      if (oldNama) {
        // Edit existing
        const idx = DB.kelas.findIndex(k => k === oldNama);
        if (idx > -1) {
          DB.kelas[idx] = newNama;
          // Update siswa yang terkait
          DB.siswa.forEach(s => { if (s.kelas === oldNama) s.kelas = newNama; });
          addAuditLog('Edit Kelas: ' + oldNama + ' → ' + newNama);
          showToast('Kelas berhasil diubah', 'success');
        }
      } else {
        // Add new
        if (DB.kelas.includes(newNama)) { showToast('Kelas sudah ada', 'error'); return; }
        DB.kelas.push(newNama);
        addAuditLog('Tambah Kelas: ' + newNama);
        showToast('Kelas berhasil ditambahkan', 'success');
      }
        // WAJIB
        await simpanDataKeStorage("kelas");

      document.getElementById('formKelasContainer').classList.add('hidden');
      filterKelasAdmin();
    }

    async function deleteKelas(nama) {
      const jmlSiswa = DB.siswa.filter(s => s.kelas === nama).length;
      if (jmlSiswa > 0) { showToast('Tidak bisa menghapus kelas yang masih memiliki siswa', 'error'); return; }
      const idx = DB.kelas.findIndex(k => k === nama);
      if (idx > -1) {
        DB.kelas.splice(idx, 1);
        // WAJIB
        await simpanDataKeStorage("kelas");
        addAuditLog('Hapus Kelas: ' + nama);
        showToast('Kelas berhasil dihapus', 'success');
        filterKelasAdmin();
      }
    }

    function downloadKelasTemplate() {
      const csv = 'Nama Kelas\nX TKJ 1\nX TKJ 2\nXI RPL 1\nXI RPL 2\nXII MM 1\nXII MM 2';
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'template_kelas.csv';
      link.click();
      URL.revokeObjectURL(link.href);
      showToast('Template kelas berhasil diunduh', 'success');
    }

    function importKelasExcel(e) {
      const file = e.target.files[0];
      if (!file) { showToast('Pilih file terlebih dahulu', 'error'); return; }
      const reader = new FileReader();
      reader.onload = event => {
        try {
          const lines = event.target.result.split('\n').filter(l => l.trim());
          if (lines.length < 2) { showToast('Format file tidak valid', 'error'); return; }
          let imported = 0;
          for (let i = 1; i < lines.length; i++) {
            const nama = lines[i].trim();
            if (nama && !DB.kelas.includes(nama)) {
              DB.kelas.push(nama);
              imported++;
            }
          }

          // WAJIB
          simpanDataKeStorage("kelas");

          addAuditLog('Import Kelas (' + imported + ' data)');
          showToast(imported + ' kelas berhasil diimpor', 'success');
          filterKelasAdmin();
        } catch (err) { showToast('Error: ' + err.message, 'error'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function importGuruExcel(e) {
      const file = e.target.files[0];
      if (!file) { showToast('Pilih file terlebih dahulu', 'error'); return; }
      const reader = new FileReader();
      reader.onload = event => {
        try {
          const lines = event.target.result.split('\n').filter(l => l.trim());
          if (lines.length < 2) { showToast('Format file tidak valid', 'error'); return; }
          let imported = 0;
          if (!DB.users) DB.users = [];
          
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',').map(c => c.trim());
            if (cols.length >= 5 && cols[0] && cols[3] && cols[4]) {
              const exist = DB.users.find(u => u.username === cols[3]);
              if (!exist) {
                const roleTerpilih = cols[5] ? cols[5].toLowerCase() : 'guru';
                DB.users.push({ 
                  id: 'USR-' + (Date.now() + i), 
                  name: cols[0], 
                  nip: cols[1], 
                  mapel: roleTerpilih === 'guru' ? cols[2] : '', 
                  username: cols[3], 
                  password: cols[4], 
                  role: roleTerpilih,
                  kelasBinaan: roleTerpilih === 'walas' ? (cols[6] ? cols[6].toUpperCase() : '') : ''

                imported++;

        renderAdminGuru();

      };
      reader.readAsText(file);
      e.target.value = '';
    }

function hapusSiswaTerpilih(){

    const ids=[...document.querySelectorAll(".cekSiswa:checked")]
        .map(x=>String(x.value));

    if(ids.length===0){

        showToast("Pilih siswa yang akan dihapus","warning");
        return;

    }

    if(!confirm(`Hapus ${ids.length} siswa beserta seluruh riwayatnya?`))
        return;

    DB.siswa=DB.siswa.filter(s=>!ids.includes(String(s.id)));

    DB.kehadiran=(DB.kehadiran||[])
        .filter(k=>!ids.includes(String(k.siswaId)));

    DB.pelanggaran=(DB.pelanggaran||[])
        .filter(p=>
            !ids.includes(String(p.siswaId)) &&
            !ids.includes(String(p.idSiswa))
        );

    DB.penebusan_poin=(DB.penebusan_poin||[])
        .filter(p=>!ids.includes(String(p.siswaId)));

    simpanDataKeStorage("siswa");

    addAuditLog(
        "Hapus Massal Siswa ("+ids.length+")"
    );

    showToast(
        ids.length+" siswa berhasil dihapus",
        "success"
    );

    renderAdminSiswa();

}
function exportSiswaToExcel() {
  // 1. Dapatkan parameter filter aktif saat ini di UI (Pencarian & Kelas)
  const search = (document.getElementById('searchSiswa')?.value || '').toLowerCase();
  const kelas = document.getElementById('filterKelasS')?.value || '';
  
  let dataSiswa = [...DB.siswa];

  // 2. Lakukan pengurutan yang konsisten (Kelas -> Nama) sesuai dengan tampilan tabel
  dataSiswa.sort((a, b) => {
    const k = a.kelas.localeCompare(b.kelas, 'id', { numeric: true });
    if (k !== 0) return k;
    return a.nama.localeCompare(b.nama, 'id');
  });

  // 3. Filter data jika pengguna sedang memfilter tabel di layar aplikasi
  if (kelas) dataSiswa = dataSiswa.filter(s => s.kelas === kelas);
  if (search) dataSiswa = dataSiswa.filter(s => s.nama.toLowerCase().includes(search));

  if (dataSiswa.length === 0) {
    showToast('Tidak ada data siswa yang dapat diekspor', 'error');
    return;
  }

  // 4. Petakan struktur array objek agar nama header kolom Excel rapi dan bersih
  const rows = dataSiswa.map((s, index) => ({
    "No": index + 1,
    "Nama Lengkap": s.nama || '-',
    "NISN": s.nisn || '-',
    "Kelas / Rombel": s.kelas || '-',
    "Jenis Kelamin": s.jk === 'L' ? 'Laki-laki' : (s.jk === 'P' ? 'Perempuan' : s.jk),
    "No. HP Orang Tua": s.hpOrangTua || '-'
  }));

  try {
    // 5. Eksekusi konversi data menggunakan SheetJS (XLSX)
    const worksheet = XLSX.utils.json_to_sheet(rows);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Data Siswa");

    // Mengatur lebar kolom dinamis agar tulisan nama dan no hp tidak terpotong (Truncated)
    worksheet['!cols'] = [
      { wch: 6 },  // No
      { wch: 30 }, // Nama Lengkap
      { wch: 16 }, // NISN
      { wch: 15 }, // Kelas
      { wch: 15 }, // Jenis Kelamin
      { wch: 22 }  // No. HP Orang Tua
    ];

    // 6. Unduh file spreadsheet secara otomatis
    const labelKelas = kelas ? `_Kelas_${kelas.replace(/\s+/g, '_')}` : '_Semua_Kelas';
    const timestamp = new Date().toISOString().slice(0, 10);
    const namaFile = `Data_Siswa_SMKN_1_Mepanga${labelKelas}_${timestamp}.xlsx`;
    
    XLSX.writeFile(workbook, namaFile);
    showToast('Data siswa berhasil diekspor ke Excel', 'success');
    addAuditLog('Export Data Siswa ke Excel');
  } catch (error) {
    console.error(error);
    showToast('Gagal mengekspor data: ' + error.message, 'error');
  }
}

    function downloadTemplateSekretarisCSV() {
      // Membuat susunan header kolom murni sesuai kebutuhan struktur sistem
      const headerKolom = ["nama", "kelas", "username", "password"];

      // Memberikan baris contoh pengisian di bawahnya agar pengguna tidak bingung
      const barisContoh = ["Ahmad Fauzi", "X TKR 1", "ahmad123", "password123"];

      const isiCsv = [
        headerKolom.join(","),
        barisContoh.join(",")
      ];

      // Proses download otomatis ke browser
      const blob = new Blob([isiCsv.join("\n")], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `Template_Impor_Sekretaris_SMKN1Mepanga.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      if (typeof showToast === 'function') {
        showToast('Template CSV berhasil diunduh', 'success');
      }
    }

    // ====================================================
    // FUNGSI IMPOR DATA SEKRETARIS DARI CSV
    // ====================================================
    function imporSekretarisCSV(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const teks = e.target.result;
        const baris = teks.split("\n");

        if (baris.length <= 1) {
          showToast('File CSV kosong atau tidak valid', 'error');
          return;
        }

        let jumlahBerhasil = 0;
        const waktuSekarang = Date.now();

        for (let i = 1; i < baris.length; i++) {
          const dataBaris = baris[i].trim();
          if (!dataBaris) continue; // Lewati baris kosong

          // Memisahkan kolom dengan aman menggunakan regex koma
          const kolom = dataBaris.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

          if (kolom.length >= 3) {
            const nama_baru = kolom[0] ? kolom[0].replace(/["']/g, "").trim() : "";
            const kelas_baru = kolom[1] ? kolom[1].replace(/["']/g, "").trim() : "";
            const user_baru = kolom[2] ? kolom[2].replace(/["']/g, "").trim() : "";
            const pass_baru = kolom[3] ? kolom[3].replace(/["']/g, "").trim() : "123456"; // default jika kosong

            // Validasi duplikasi username (case-insensitive) agar tidak merusak sistem login
            const adaDuplikat = DB.users.some(x => x.username.trim().toLowerCase() === user_baru.toLowerCase());

            if (!adaDuplikat && nama_baru !== "" && user_baru !== "") {
              DB.users.push({
                id: waktuSekarang + i, // ID berupa angka unik seperti Date.now() di aplikasi Anda
                name: nama_baru,
                kelas: kelas_baru,
                username: user_baru,
                password: pass_baru,
                role: 'sekretaris'
              });
              jumlahBerhasil++;
            }
          }
        }

        if (jumlahBerhasil > 0) {
          // Otomatisasi penyimpanan mengikuti sistem simpan aplikasi Anda
          if (typeof saveDB === 'function') {
            saveDB();
          } else if (typeof localStorage !== 'undefined') {
         simpanDataKeStorage("users");
          }

          // Mengikuti log audit dan toast bawaan kode Anda
          addAuditLog('Impor data sekretaris via CSV');
          showToast(`Berhasil menambahkan ${jumlahBerhasil} sekretaris`, 'success');

          // Render ulang tabel daftar sekretaris secara real-time
          renderAdminSekretaris();
        } else {
          showToast('Gagal mengimpor. Periksa apakah username sudah digunakan', 'error');
        }
      };

      reader.readAsText(file);
      event.target.value = ''; // Reset input file agar bisa digunakan kembali
    }

// =========================================================================
// ⚡ FUNGSI PEMBANTU BARU: AUTO-COMPRESS IMAGES (MENJAGA KUOTA STORAGE AMAN)
// =========================================================================
function kompresGambarBase64(dataUrl, maxWidth, maxHeight, callback) {
  const img = new Image();
  img.onload = function() {
    let width = img.width;
    let height = img.height;

    // Hitung proporsi aspek rasio agar logo/ttd tidak gepeng
    if (width > height) {
      if (width > maxWidth) {
        height *= maxWidth / width;
        width = maxWidth;
      }
    } else {
      if (height > maxHeight) {
        width *= maxHeight / height;
        height = maxHeight;
      }
    }

    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, width, height);

    // Menggunakan format image/png agar background transparan TTD & Cap tetap terjaga
    const compressedDataUrl = canvas.toDataURL('image/png');
    callback(compressedDataUrl);
  };
  img.src = dataUrl;
}

// =========================================================================
// PERBAIKAN FUNGSI: UPLOAD LOGO DENGAN ENGINE KOMPRESI OTOMATIS
// =========================================================================
function uploadLogo(e, type) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = event => {
    const rawDataUrl = event.target.result;
    
    // Perkecil ukuran ke max 250px (Sangat pas dan tajam untuk space kartu pelajar)
    kompresGambarBase64(rawDataUrl, 250, 250, function(compressedDataUrl) {
      
      if (type === 'sekolah') {
        DB.identitas.logoSekolah = compressedDataUrl;
        document.getElementById('logoSekolah').innerHTML = `<img src="${compressedDataUrl}" alt="Logo Sekolah" class="w-full h-full object-contain p-1">`;
      } else if (type === 'provinsi') {
        DB.identitas.logoProvinsi = compressedDataUrl;
        document.getElementById('logoProvinsi').innerHTML = `<img src="${compressedDataUrl}" alt="Logo Provinsi" class="w-full h-full object-contain p-1">`;
      } else if (type === 'ttd') {
        DB.identitas.ttdKepsek = compressedDataUrl;
        document.getElementById('ttdKepsek').innerHTML = `<img src="${compressedDataUrl}" alt="TTD Kepsek" class="w-full h-full object-contain p-1">`;
      } else if (type === 'cap') {
        DB.identitas.capSekolah = compressedDataUrl;
        document.getElementById('capSekolah').innerHTML = `<img src="${compressedDataUrl}" alt="Cap Sekolah" class="w-full h-full object-contain p-1">`;
      }

      // Kunci data gambar hasil kompresi yang super ringan ke localStorage browser
      try {
        localStorage.setItem('sik_identitas_lokal', JSON.stringify(DB.identitas));
        if (typeof showToast === 'function') {
          showToast('Berkas berhasil diunggah & dikompres otomatis!', 'success');
        }
      } catch (err) {
        console.error("Gagal menulis lokal storage:", err);
        alert("Gagal menyimpan gambar secara lokal. Pastikan gambar tidak terlalu kompleks.");
      }
    });
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

    logoSekolah: DB.identitas.logoSekolah || null,

    ttdKepsek: DB.identitas.ttdKepsek || null,
    capSekolah: DB.identitas.capSekolah || null
  };

  // Dibungkus Try-Catch agar jika ada anomali kuota penuh, program utama web Anda TIDAK AKAN MANDET/CRASH
  try {
    localStorage.setItem('sik_identitas_lokal', JSON.stringify(DB.identitas));
  } catch (error) {
    console.warn("Storage browser penuh:", error.message);
  }

  // Tetap paksa kirim data sinkronisasi utama ke database cloud Firebase/Hosting Anda
  if (typeof simpanDataKeStorage === 'function') {

  }

  if (typeof addAuditLog === 'function') addAuditLog('Update Identitas Sekolah');
  if (typeof showToast === 'function') showToast('Identitas sekolah berhasil disimpan', 'success');

  if (typeof renderPage === 'function') {
    renderPage('admin-identitas');

  }
}

function simpanPelanggaran() {
        const siswaId = document.getElementById('ipSiswa').value;
        const tanggal = document.getElementById('ipTanggal').value;
        const jenisId = document.getElementById('ipJenis').value;
        const guru = document.getElementById('ipGuru').value;

        if (!siswaId || !tanggal || !jenisId || !guru || guru.trim() === '') {
          showToast('Lengkapi semua data / Pastikan siswa dipilih dari list', 'error');
          return;
        }

        // 🌟 1. CARI DATA ATURAN TATA TERTIB BERDASARKAN ID/KODE YANG DIPILIH
        if (!DB.tatatertib || !Array.isArray(DB.tatatertib)) { DB.tatatertib = []; }
        const aturanTerpilih = DB.tatatertib.find(t => String(t.id) === String(jenisId) || String(t.kode) === String(jenisId));

        if (!aturanTerpilih) {
          showToast('Aturan tata tertib tidak valid atau tidak ditemukan di sistem!', 'error');
          return;
        }

        const namaPelanggaran = aturanTerpilih.nama || aturanTerpilih.deskripsi || aturanTerpilih.jenis || "Pelanggaran Tanpa Nama";
        const bobotPoin = parseInt(aturanTerpilih.poin) || 0;
        const kategoriPelanggaran = aturanTerpilih.kategori || "Ringan";

        // 🌟 2. CARI DATA SISWA UNTUK MENYERTAKAN NAMA DAN KELASNYA AGAR FIREBASE LENGKAP
        const siswaTerpilih = DB.siswa ? DB.siswa.find(s => String(s.id) === String(siswaId)) : null;
        const namaSiswa = siswaTerpilih ? siswaTerpilih.nama : "Siswa Tidak Dikenal";
        const kelasSiswa = siswaTerpilih ? siswaTerpilih.kelas : "-";

        // 🌟 PROTEKSI DOUBLE INPUT: Ambil elemen tombol simpan dan kunci seketika
        const btnSimpan = document.querySelector("button[onclick='simpanPelanggaran()']");
        if (btnSimpan) {
          btnSimpan.disabled = true;
          btnSimpan.innerText = "⏳ Menyimpan...";
          btnSimpan.classList.add("opacity-50", "cursor-not-allowed");
        }

        // 🌟 3. BUAT OBJEK DATA YANG LENGKAP DENGAN NAMA DAN BOBOT POIN ASLI
        const pelanggaranBaru = {
          id: 'P-' + Date.now(),
          siswaId: siswaId,
          namaSiswa: namaSiswa,         
          kelas: kelasSiswa,            
          jenisId: jenisId,
          namaPelanggaran: namaPelanggaran, 
          poin: bobotPoin,                  
          kategori: kategoriPelanggaran,    
          tanggal: tanggal,
          guru: guru.trim()
        };

        if (!DB.pelanggaran) { DB.pelanggaran = []; }
        DB.pelanggaran.push(pelanggaranBaru);
        const key = pelanggaranBaru.id;

        // 🌟 4. UPDATE JUGA AKUMULASI POIN SISWA DI LOKAL STATE AGAR VISUAL LANGSUNG BERUBAH
        if (siswaTerpilih) {
          siswaTerpilih.poinPelanggaranDasar = (siswaTerpilih.poinPelanggaranDasar || 0) + bobotPoin;
          siswaTerpilih.poin = (siswaTerpilih.poin || 0) - bobotPoin; 
        }

        // Fungsi pembantu untuk mengembalikan kondisi tombol jika gagal
        const aktifkanTombolKembali = () => {
          if (btnSimpan) {
            btnSimpan.disabled = false;
            btnSimpan.innerText = "Simpan";
            btnSimpan.classList.remove("opacity-50", "cursor-not-allowed");
          }
        };

        // 🌟 5. REVISI DI SINI: PROSES SIMPAN INSTAN TANPA UPLOAD ULANG SATU STORAGE SISWA
        let targetDb = typeof database !== 'undefined' ? database : (window.firebase?.apps?.[0]?.database());

        if (targetDb) {
          const updates = {};
          
          // Simpan data pelanggaran baru ke jalurnya
          updates["kesiswaan_cloud/pelanggaran/" + key] = pelanggaranBaru;
          
          // Update poin siswa yang bersangkutan ke jalurnya secara spesifik (tidak mengunggah ulang semua siswa)
          if (siswaTerpilih) {
            updates["kesiswaan_cloud/siswa/" + siswaId + "/poinPelanggaranDasar"] = siswaTerpilih.poinPelanggaranDasar;
            updates["kesiswaan_cloud/siswa/" + siswaId + "/poin"] = siswaTerpilih.poin;
          }

          // Kirim perubahan sekaligus ke Firebase Realtime Database
          targetDb.ref().update(updates)
          .then(() => {

function bukaDropdownKPSiswa() {
  const dropdown = document.getElementById('dropdownKPSiswa');
  if (!dropdown) return;

  dropdown.classList.remove('hidden');

  if (document.getElementById('kpCariSiswa').value.trim() === '') {
    filterKPSiswa();
  }
}

function filterKPSiswa() {
  const kataKunci = document.getElementById('kpCariSiswa').value.toLowerCase().trim();
  const dropdown = document.getElementById('dropdownKPSiswa');

  // 1. Ambil data master siswa awal
  let dataSiswaMentah = DB.siswa || [];

  // 2. JIKA ROLE ADALAH WALAS, KUNCI LIST-NYA SEJAK AWAL
  if (currentUser.role === 'walas') {
    const kelasBinaanSaya = (currentUser.kelasBinaan || '').toUpperCase();
    dataSiswaMentah = dataSiswaMentah.filter(s => (s.kelas || '').toUpperCase() === kelasBinaanSaya);
  }

  // 3. Jalankan penyaringan teks pencarian dari data yang sudah dikunci tadi
  const hasilFilter = dataSiswaMentah.filter(s =>
    (s.nama || '').toLowerCase().includes(kataKunci) ||
    (s.kelas || '').toLowerCase().includes(kataKunci)
  );

  if (hasilFilter.length === 0) {
    dropdown.innerHTML = `
      <div class="p-3 text-xs text-gray-400 italic text-center">
        Siswa tidak ditemukan
      </div>
    `;
    return;
  }

  dropdown.innerHTML = hasilFilter.map(s => `
    <div
      onclick="pilihKPSiswa('${s.id}','${s.nama}','${s.kelas || '-'}')"
      class="p-3 text-sm hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer flex justify-between items-center transition"
    >
      <span class="font-medium text-gray-900 dark:text-white">${s.nama}</span>
      <span class="text-xs px-2 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 rounded-md font-mono">
        ${s.kelas}
      </span>
    </div>
  `).join('');
}

function pilihKPSiswa(id, nama, kelas) {
  document.getElementById('kpCariSiswa').value = `${nama} (${kelas})`;
  document.getElementById('kpSiswa').value = id;
  document.getElementById('dropdownKPSiswa').classList.add('hidden');

  const s = DB.siswa.find(x => x.id == id);

async function simpanKreditPoin() {
  const siswaId = document.getElementById('kpSiswa').value;
  const kreditId = document.getElementById('kpJenis').value;
  const poin = parseInt(document.getElementById('kpPoin').value) || 0;
  const tanggal = document.getElementById('kpTanggal').value;
  const deskripsi = document.getElementById('kpDeskripsi').value.trim();
  const checklist = document.getElementById('kpChecklist').checked;

  if (!siswaId) {
    showToast('Pilih siswa terlebih dahulu', 'error');
    return;
  }

  if (!kreditId) {
    showToast('Pilih kredit poin terlebih dahulu', 'error');
    return;
  }

  if (!deskripsi) {
    showToast('Deskripsi kegiatan wajib diisi', 'error');
    return;
  }

  if (!checklist) {
    showToast('Centang pernyataan penginput', 'error');
    return;
  }

  const siswa = DB.siswa.find(s => String(s.id) === String(siswaId));
  const kredit = DB.kreditPoinMaster.find(k =>
    String(k.kode) === String(kreditId) || String(k.id) === String(kreditId)
  );

  if (!siswa || !kredit) {
    showToast('Data siswa atau kredit poin tidak ditemukan', 'error');
    return;
  }

  // Proteksi Tambahan: Jika Walas mencoba menembak data siswa kelas lain, blokir langsung!
  if (currentUser.role === 'walas') {
    const kelasBinaanSaya = (currentUser.kelasBinaan || '').toUpperCase();
    if ((siswa.kelas || '').toUpperCase() !== kelasBinaanSaya) {
      showToast('Akses Ditolak! Anda tidak diizinkan memberi poin ke siswa kelas lain.', 'error');
      return;
    }
  }

  const dataBaru = {
    id: 'KP-' + Date.now(),
    siswaId: siswa.id,
    nama: siswa.nama,
    nisn: siswa.nisn,
    kelas: siswa.kelas,
    kreditId: kredit.kode || kredit.id,
    namaKredit: kredit.nama,
    poin: poin,
    deskripsi: deskripsi,
    tanggal: tanggal,
    penginput: currentUser.name,
    rolePenginput: currentUser.role
  };

  if (!DB.kreditPoin) {
    DB.kreditPoin = [];
  }

  DB.kreditPoin.push(dataBaru);

  // Jika di sistem Anda perlu memperbarui total poin siswa langsung di objek siswa:
  siswa.poin = (siswa.poin || 0) + poin;

  await simpanDataKeStorage("kreditPoin");
  showToast('Kredit poin berhasil disimpan', 'success');
  renderInputKreditPoin();
}

function loadKehadiranFromFirebase() {
  // Mengarah ke path yang benar di kesiswaan_cloud
  firebase.database().ref("kesiswaan_cloud/kehadiran").on("value", (snapshot) => {
    const data = snapshot.val();

    if (data) {
      // 🔥 PERBAIKAN KRUSIAL: Cek apakah data dari Firebase berupa Array atau Objek
      if (Array.isArray(data)) {
        // Jika sudah berbentuk Array murni, langsung gunakan (buang element null jika ada)
        DB.kehadiran = data.filter(item => item !== null);
      } else {
        // Jika berbentuk Objek, konversi menggunakan Object.values
        DB.kehadiran = Object.values(data);
      }
    } else {
      DB.kehadiran = [];
    }

    console.log("Kehadiran berhasil dimuat dari Firebase:", DB.kehadiran);

    // 🔥 Langsung panggil sinkronisasi dropdown halaman sekretaris
    if (typeof muatUlangStatusAbsenSekre === "function") {
      muatUlangStatusAbsenSekre();
    }

    // Perbarui halaman dashboard jika sedang dibuka
    if (typeof hitungUlangPoinDashboard === "function") {
      hitungUlangPoinDashboard();
    }

    if (typeof currentPage !== 'undefined' && currentPage === 'dashboard') {
      if (typeof renderDashboardKesiswaanBaru === "function") {
        renderDashboardKesiswaanBaru(); 
      } else if (typeof renderPage === "function") {
        renderPage('dashboard');
      }
    }
  });
}

          tanggal: tanggal,
          kelas: myKelas
      });
  }

  if (!Array.isArray(DB.kehadiran)) DB.kehadiran = [];

  // Hapus data lama di tanggal & kelas yang sama agar tidak duplikat saat ditimpa data baru
  DB.kehadiran = DB.kehadiran.filter(k => {
    const s = DB.siswa.find(x => x.id == k.siswaId);
    return !(s && s.kelas === myKelas && k.tanggal === tanggal);
  });

  // Input data baru berdasarkan pilihan sekretaris
  for (const s of siswaKelas) {
    const status = document.getElementById('kh-' + s.id).value;

    // KUNCI PERBAIKAN UTAMA:
    // Jika statusnya BUKAN strip ("-"), maka masukkan ke database (termasuk status "hadir")
    if (status !== '-') {

    const id = "ABS_" + Date.now() + "_" + s.id;

    const dataAbsen = {
        id: id,
        siswaId: s.id,
        tanggal: tanggal,
        kelas: myKelas,
        status: status.toLowerCase()
    };

    DB.kehadiran.push(dataAbsen);
    dataKelas.push(dataAbsen);

}
    // ========================================================
    // 🔥 MODUL BARU: KIRIM WHATSAPP JIKA STATUS = ALPA (A)
    // ========================================================
    if (status.toLowerCase() === 'alpa' || status.toLowerCase() === 'a') {
      
      // Mengambil nomor HP orang tua dari data objek siswa.
      const noHpOrangTua = s.ortuWa || s.hpOrangTua || s.noHpOrangTua || s.telepon || s.hp;

      if (noHpOrangTua) {
        // Format tanggal Indonesia agar rapi dibaca (Contoh: 25 Juni 2026)
        const formatTanggalIndo = new Date(tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        
        // Template pesan resmi dari SMKN 1 Mepanga
        const teksPesan = `Yth. Orang Tua/Wali dari *${s.nama}* (Kelas: ${myKelas}).\n\n` +
                          `Menginfokan bahwa pada tanggal *${formatTanggalIndo}*, ananda bersangkutan tercatat *TIDAK HADIR (ALPA)* tanpa keterangan pada aplikasi Sistem Informasi Kesiswaan SMKN 1 Mepanga.\n\n` +
                          `Mohon bimbingan bapak/ibu di rumah dan segera konfirmasinya ke pihak sekolah jika terdapat kekeliruan. Terima kasih.`;

        // Jalankan fungsi pengirim WhatsApp Fonnte Anda
        kirimWhatsAppOrangTua(noHpOrangTua, teksPesan);
      } else {
        console.log(`WhatsApp Terlewati: Nomor HP Orang tua untuk siswa ${s.nama} belum diisi.`);
      }
    }
  }

  await simpanKehadiranKelas(
    tanggal,
    myKelas,
    dataKelas
);

  // Lanjut ke engine utama bawaan sistem Anda untuk sinkronisasi ke Firebase
  await simpanKehadiranDanSync();
}

// ===================================================================
// ENGINE UTAMA: HITUNG AKUMULASI POIN KETIDAKHADIRAN KE DATA MASTER SISWA
// ===================================================================
async function simpanKehadiranDanSync() {
  if (!DB.siswa) return;

  DB.siswa.forEach(siswa => {

    // =========================
    // HITUNG ABSENSI
    // =========================
    let totalPoinAbsen = 0;

    const logAbsen = (DB.kehadiran || []).filter(
      k => String(k.siswaId) == String(siswa.id)
    );

    logAbsen.forEach(log => {
      const st = log.status.toLowerCase();

      if (st === 'alpa' || st === 'a') totalPoinAbsen += 3;
      else if (st === 'izin' || st === 'i') totalPoinAbsen += 1;
      else if (st === 'sakit' || st === 's') totalPoinAbsen += 0.5;
    });

    siswa.poinAbsen = totalPoinAbsen;

    // =========================
    // HITUNG PELANGGARAN
    // =========================
    let totalPoinTataTertib = 0;

    if (DB.pelanggaran) {
      const pelanggaranSiswa = DB.pelanggaran.filter(p =>
        String(p.siswaId) === String(siswa.id) ||
        (p.namaSiswa || "").trim().toLowerCase() === siswa.nama.trim().toLowerCase()
      );

      pelanggaranSiswa.forEach(p => {
        const tt = (DB.tatatertib || []).find(x =>
          x.id == p.jenisId || x.kode == p.jenisId
        );

        totalPoinTataTertib += tt ? parseInt(tt.poin) : (parseInt(p.poin) || 0);
      });
    }

    siswa.poinPelanggaranDasar = totalPoinTataTertib;

    // ===================================================================
    // 🔥 PERBAIKAN RUMUS UTAMA: Mencegah Terhapusnya Nilai Poin Penebusan
    // ===================================================================
    const totalPoinKotor = totalPoinAbsen + totalPoinTataTertib;
    const pengurangPenebusan = parseInt(siswa.poinPenebusan) || 0;
    
    // Total poin akhir tidak boleh di bawah 0 (nol)
    siswa.poin = Math.max(0, totalPoinKotor - pengurangPenebusan);
  });

  // =========================
  // SIMPAN LOCAL & CLOUD
  // =========================
  localStorage.setItem('kesiswaan_db', JSON.stringify(DB));

  if (typeof saveDB === "function") {
    saveDB();
  }

  // Amankan sinkronisasi murni menuju kesiswaan_cloud
if (false) {
    await simpanDataKeStorage("siswa");
}
  // =========================
  // UI UPDATE
  // =========================
  if (typeof renderDashboardKesiswaanBaru === "function") {
    renderDashboardKesiswaanBaru();
  } else if (typeof renderDashboard === "function") {
    renderDashboard();
  }

  if (typeof addAuditLog === "function") addAuditLog('Input Kehadiran');

  if (typeof showToast === "function") {
    showToast('Kehadiran berhasil disimpan ke Firebase!', 'success');
  }

  if (typeof muatUlangStatusAbsenSekre === "function") {
    muatUlangStatusAbsenSekre();
  }
}

          
function hitungUlangPoinDashboard() {
  if (!DB.siswa) return;

  DB.siswa.forEach(siswa => {
    let totalPoinTataTertib = 0;
    let totalPoinAbsensi = 0;
    let totalPenebusanKhusus = 0; // 🔥 Variabel baru untuk penampung pemulihan

    // ==========================
    // HITUNG POIN PELANGGARAN
    // ==========================
    if (DB.pelanggaran) {
      const pelanggaranSiswa = DB.pelanggaran.filter(p =>
        String(p.siswaId) === String(siswa.id) ||
        String(p.idSiswa) === String(siswa.id)
      );

      pelanggaranSiswa.forEach(p => {
        const tt = (DB.tatatertib || []).find(x =>
          x.id == p.jenisId ||
          x.kode == p.jenisId
        );
        totalPoinTataTertib += tt ? Number(tt.poin || 0) : Number(p.poin || 0);
      });
    }

    // ==========================
    // HITUNG POIN ABSENSI
    // ==========================
    if (DB.kehadiran) {
      const logSiswa = DB.kehadiran.filter(k =>
        String(k.siswaId).trim() == String(siswa.id).trim()
      );

      logSiswa.forEach(k => {
        const st = String(k.status).toUpperCase().trim();
        if (st === 'A' || st === 'ALFA' || st === 'ALPA') {
          totalPoinAbsensi += 3;
        } else if (st === 'I' || st === 'IZIN') {
          totalPoinAbsensi += 1;
        } else if (st === 'S' || st === 'SAKIT') {
          totalPoinAbsensi += 0.5;
        }
      });
    }

    // ==========================================================
    // 🔥 BARU: HITUNG PENEBUSAN KHUSUS (DARI LACI PENEBUSAN)
    // ==========================================================
    if (DB.penebusan_poin) {
      const penebusanSiswa = DB.penebusan_poin.filter(p => 
        String(p.siswaId) === String(siswa.id)
      );
      
      penebusanSiswa.forEach(p => {
        totalPenebusanKhusus += Number(p.poinPemulihan || 0);
      });
    }

    // ==========================================================
    // SIMPAN HASIL KE STRUKTUR DATA SISWA
    // ==========================================================
    siswa.poinAbsen = totalPoinAbsensi;
    siswa.poinPelanggaranDasar = totalPoinTataTertib;
    siswa.totalPenebusanKhusus = totalPenebusanKhusus; // 🔥 Simpan record penebusan

    // 🧮 RUMUS BARU: Dimulai dari 0, Dosa dikurangi (-), Penebusan ditambah (+)
    siswa.poin = 0 - totalPoinTataTertib - totalPoinAbsensi + totalPenebusanKhusus;
  });

  // Sinkronisasikan ke LocalStorage bawaan aplikasi Anda
  localStorage.setItem('kesiswaan_db', JSON.stringify(DB));

  // Jalankan render dashboard bawaan aplikasi Anda
  if (typeof renderDashboard === "function") {
    renderDashboard();
  }
}

    function exportData(type, format) {
      let content = '', filename = '';

      if (type === 'pelanggaran') {
        content = 'Nama,NISN,Kelas,Tanggal,Pelanggaran,Poin\n';
        DB.pelanggaran.forEach(p => {
          const s = DB.siswa.find(x => x.id === p.siswaId);
          const tt = DB.tatatertib.find(x => x.id === p.jenisId);
          if (s && tt) content += `${s.nama},${s.nisn},${s.kelas},${p.tanggal},${tt.jenis},${tt.poin}\n`;
        });
        filename = 'Rekap_Pelanggaran';
      }
      else if (type === 'kehadiran') {
        content = 'Nama,Kelas,Sakit,Izin,Alpa,Total\n';
        DB.siswa.forEach(s => {
          const kh = DB.kehadiran.filter(k => k.siswaId === s.id);
          const sakit = kh.filter(k => k.status === 'sakit').length;
          const izin = kh.filter(k => k.status === 'izin').length;
          const alpa = kh.filter(k => k.status === 'alpa').length;
          const total = sakit + izin + alpa;
          if (total > 0) content += `${s.nama},${s.kelas},${sakit},${izin},${alpa},${total}\n`;
        });
        filename = 'Rekap_Kehadiran';
      }
      else if (type === 'kehadiran-sekre') {
        const myKelas = currentUser.kelas;
        content = 'Nama,Sakit,Izin,Alpa,Total\n';
        DB.siswa.filter(s => s.kelas === myKelas).forEach(s => {
          const kh = DB.kehadiran.filter(k => k.siswaId === s.id);
          const sakit = kh.filter(k => k.status === 'sakit').length;
          const izin = kh.filter(k => k.status === 'izin').length;
          const alpa = kh.filter(k => k.status === 'alpa').length;
          const total = sakit + izin + alpa;
          if (total > 0) content += `${s.nama},${sakit},${izin},${alpa},${total}\n`;
        });
        filename = 'Rekap_Kehadiran_' + myKelas;
      }

      const blob = new Blob([content], { type: format === 'excel' ? 'text/csv;charset=utf-8;' : 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename + '.' + (format === 'excel' ? 'csv' : 'csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      showToast(`Export ${format.toUpperCase()} berhasil diunduh`, 'success');
    }

    function dalamPeriodeAktif(tanggal) {

  if (!tanggal) return false;

  const awal = DB.identitas?.tglAwalPembelajaran;
  const akhir = DB.identitas?.tglAkhirPembelajaran;

  if (!awal || !akhir) return true;

  const t = new Date(tanggal);
  const a = new Date(awal);
  const b = new Date(akhir);

  return t >= a && t <= b;
}

function hitungHariAktifSekolah(){

  const awal =
    DB.identitas?.tglAwalPembelajaran;

  const akhir =
    DB.identitas?.tglAkhirPembelajaran;

  if(!awal || !akhir) return 0;

  let total = 0;

  let tgl = new Date(awal);
  const batas = new Date(akhir);

  while(tgl <= batas){

    // Minggu libur
    if(tgl.getDay() !== 0){
      total++;
    }

    tgl.setDate(
      tgl.getDate() + 1
    );
  }

  return total;
}

  return (DB.hariAktif || []).length;

    function hitungPoinSiswa(siswaId){

      const siswa =
        DB.siswa.find(
          s => String(s.id) === String(siswaId)

          totalKredit:0,

        Number(siswa.poinAbsen || 0) +
        Number(siswa.poinPelanggaranDasar || 0);

      const sisaPoin =

        totalKredit,

      };

// 1. UBAH PROSES KONVERSI: Simpan langsung ke memori DB saat user memilih file
function prosesKonversiBase64(input, elementIdPreview) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    
    // VALIDASI UKURAN: Jika di atas 500KB, beri peringatan agar Firebase tidak menolak
    if (file.size > 500 * 1024) {
      alert("Ukuran file terlalu besar! Harap gunakan file di bawah 500 KB agar tersimpan permanen di cloud.");
      input.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      // Tampilkan preview di layar
      const prevEl = document.getElementById(elementIdPreview);
      if (prevEl) prevEl.src = e.target.result;
      
      // Masukkan langsung ke objek DB sesuai jenisnya agar aman saat disimpan
      if (!DB.identitas) DB.identitas = {};
      if (elementIdPreview === 'prevLogo') DB.identitas.logoSekolah = e.target.result;
      if (elementIdPreview === 'prevTtd') DB.identitas.ttdKepsek = e.target.result;
      if (elementIdPreview === 'prevCap') DB.identitas.capSekolah = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

async function simpanIdentitasSekolahLokal() {
  const k = document.getElementById('editKepsekName');
  const nk = document.getElementById('editKepsekNip');
  const w = document.getElementById('editWakasekName');
  const nw = document.getElementById('editWakasekNip');
  const ns = document.getElementById('editNamaSekolah'); 

  if (k && nk && w && nw) {
    if (!DB.identitas) DB.identitas = {};

    // Ambil data teks dari input form
    DB.identitas.kepsek = k.value;
    DB.identitas.nipKepsek = nk.value;
    DB.identitas.wakasek = w.value;
    DB.identitas.nipWakasek = nw.value;
    if (ns) DB.identitas.namaSekolah = ns.value;

    // Double check untuk memastikan data gambar di preview masuk ke objek DB
    const prevLogo = document.getElementById('prevLogo');
    const prevTtd = document.getElementById('prevTtd');
    const prevCap = document.getElementById('prevCap');

    if (prevLogo && prevLogo.src.startsWith('data:image')) DB.identitas.logoSekolah = prevLogo.src;
    if (prevTtd && prevTtd.src.startsWith('data:image')) DB.identitas.ttdKepsek = prevTtd.src;
    if (prevCap && prevCap.src.startsWith('data:image')) DB.identitas.capSekolah = prevCap.src;

    // Simpan ke LocalStorage browser sebagai backup cadangan cepat
    localStorage.setItem('sik_identitas_lokal', JSON.stringify(DB.identitas));
    
    // DETEKSI UTAMA ENGINE FIREBASE SEPERTI DI IDENTITAS LOAD ANDA
    let targetDb = null;
    if (typeof database !== 'undefined') {
      targetDb = database;
    } else if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) {
      targetDb = window.firebase.apps[0].database();
    }

    if (targetDb) {
      try {
        // Kunci data langsung masuk ke dalam struktur 'kesiswaan_cloud/identitas'
        await targetDb.ref('kesiswaan_cloud/identitas').set(DB.identitas);
        
        alert("Identitas dan berkas gambar sekolah BERHASIL disimpan permanen ke Cloud Database!");
        renderPage('admin-identitas'); 
        
      } catch (error) {
        console.error("Firebase Write Error:", error);
        alert("Gagal mengunggah ke cloud. Pastikan ukuran file gambar Anda kecil (di bawah 500KB).");
      }
    } else {
      alert("Identitas disimpan secara lokal di browser ini (Firebase Offline).");
      renderPage('admin-identitas');
    }

  } else {
    alert("Gagal menyimpan. Kolom input tidak ditemukan.");
  }
}

     function unggahTataTertibMassal(event) {

  const dataBaru = [];

          const kode = columns[0].replace(/"/g, '').trim();
          const deskripsi = columns[1].replace(/"/g, '').trim();
          const poin = parseInt(columns[2]) || 0;
          
          // Menentukan kategori pelanggaran secara otomatis berdasarkan bobot poin

            id: kode,

            nama: deskripsi,        // 🌟 WAJIB ADA: Menyelaraskan dengan fungsi input pelanggaran
            deskripsi: deskripsi, 
            jenis: deskripsi, 
            poin: poin,
            kategori: kategori      // 🌟 WAJIB ADA: Mencegah error pembagian kategori poin

function unduhTemplateKreditPoin() {

  const csvContent =
`Kode,nama,poin
KP001,Juara 1 Tingkat Kabupaten,20
KP002,Juara 1 Tingkat Provinsi,50
KP003,Juara 1 Tingkat Nasional,100`;

  const blob = new Blob([csvContent], {
    type: 'text/csv;charset=utf-8;'
  });

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = 'Template_Kredit_Poin.csv';
  link.click();
}


function unggahKreditPoinMassal(event) {

  const file = event.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {

    const text = e.target.result;

    const rows = text
      .split(/\r?\n/)
      .filter(r => r.trim());

    const dataBaru = [];

    for(let i=1;i<rows.length;i++){

      const col = rows[i].split(',');

      if(col.length >= 3){

        dataBaru.push({
          id: col[0].trim(),
          kode: col[0].trim(),
          nama: col[1].trim(),
          poin: parseInt(col[2]) || 0
        });

      }
    }

    DB.kreditPoinMaster = dataBaru;

    simpanDataKeStorage("kreditPoinMaster");

    renderKelolaKreditPoin();

    showToast(
      `${dataBaru.length} kredit poin berhasil dimuat`,
      'success'
    );
  };

  reader.readAsText(file);
}

    function filterAdminPel() {
      const kelas = document.getElementById('fKelasAdmin').value;
      const search = document.getElementById('searchAdmin').value.toLowerCase();

      if (!DB.pelanggaran) DB.pelanggaran = [];

      let data = DB.pelanggaran.map(p => {
        // FIX PENCARIAN GANDA: Cari berdasarkan ID, jika gagal cari berdasarkan Nama
        const s = DB.siswa.find(x =>
          String(x.id) === String(p.siswaId) ||
          String(x.id) === String(p.idSiswa) ||
          (p.namaSiswa || p.nama || "").trim().toLowerCase() === x.nama.trim().toLowerCase()
        );

        const tt = DB.tatatertib.find(x => x.id == p.jenisId || x.kode == p.jenisId || x.id == p.tatatertibId);

        return s && tt ? {
          nama: s.nama,
          nisn: s.nisn,
          kelas: s.kelas,
          tanggal: p.tanggal,
          jenis: tt.deskripsi || tt.jenis || 'Pelanggaran Aturan',
          poin: tt.poin,
          guru: p.guru || 'Guru Piket'
        } : null;
      }).filter(Boolean);

      if (kelas) data = data.filter(d => d.kelas === kelas);
      if (search) data = data.filter(d => d.nama.toLowerCase().includes(search));

      document.getElementById('bodyAdminPel').innerHTML = data.map(d => `
    <tr class="border-t dark:border-gray-700/50 text-xs text-gray-700 dark:text-gray-200">
      <td class="py-3 px-4 font-medium">${d.nama}</td>
      <td class="py-3 px-4 font-mono">${d.nisn}</td>

    }

    function eksekusiPrintSuratSiswa(siswaId) {
      const s = DB.siswa.find(x => x.id == siswaId);

      // 1. AMBIL DATA PELANGGARAN GURU
      const pelanggaranSiswa = (DB.pelanggaran || []).filter(p => {
        const matchId = String(p.siswaId) === String(siswaId) || String(p.idSiswa) === String(siswaId);
        const matchNama = s && (p.namaSiswa || p.nama || "").trim().toLowerCase() === s.nama.trim().toLowerCase();
        return matchId || matchNama;
      });

      let totalPoinTataTertib = 0;
      let barisTabelCetak = '';
      let barisTabelPreview = '';

      pelanggaranSiswa.forEach((p, index) => {
        const tt = DB.tatatertib.find(x => x.id == p.jenisId || x.kode == p.jenisId || x.id == p.tatatertibId);
        const poinInputGuru = parseInt(p.poin) || parseInt(p.skor) || 0;
        const poinFinal = tt ? (parseInt(tt.poin) || 0) : poinInputGuru;
        const deskripsiFinal = tt ? (tt.deskripsi || tt.jenis) : (p.keterangan || p.jenisPelanggaran || "Pelanggaran Tata Tertib");

        totalPoinTataTertib += poinFinal;

        // Baris khusus untuk Dokumen Cetak (Garis Hitam Tegas)
        barisTabelCetak += `
      <tr style="font-size: 12px;">
        <td style="padding: 8px; text-align: center; border: 1px solid #000000;">${index + 1}</td>
        <td style="padding: 8px; text-align: center; border: 1px solid #000000;">${p.tanggal}</td>
        <td style="padding: 8px; text-align: left; border: 1px solid #000000;">${deskripsiFinal}</td>
        <td style="padding: 8px; text-align: center; font-weight: bold; border: 1px solid #000000;">${poinFinal}</td>
      </tr>
    `;

        // Baris khusus untuk Preview Dashboard (Styling Lembut Tailwind)
        barisTabelPreview += `
      <tr class="border-b border-gray-100 dark:border-gray-700/50 text-xs text-gray-600 dark:text-gray-300">
        <td class="py-2 px-3 text-center font-mono">${index + 1}</td>
        <td class="py-2 px-3 text-center">${p.tanggal}</td>
        <td class="py-2 px-3 text-left max-w-xs truncate">${deskripsiFinal}</td>
        <td class="py-2 px-3 text-center font-bold text-red-500">${poinFinal}</td>
      </tr>
    `;
      });

      // 2. HITUNG LOG ABSENSI SEKRETARIS
      let totalPoinAbsensi = 0;
      let detailAbsenString = "0 Alpa, 0 Izin, 0 Sakit";

      if (s) {
        const logAbsenSiswa = (DB.kehadiran || []).filter(k => {
          const matchId = k.siswaId && String(k.siswaId) === String(s.id);
          const namaAbsen = k.namaSiswa || k.nama || k.nama_siswa || "";
          const matchNama = namaAbsen.trim().toLowerCase() === s.nama.trim().toLowerCase();
          return matchId || matchNama;
        });

        const skt = logAbsenSiswa.filter(k => ['sakit', 's', 'SAKIT'].includes(String(k.status))).length;
        const izn = logAbsenSiswa.filter(k => ['izin', 'i', 'IZIN'].includes(String(k.status))).length;
        const alp = logAbsenSiswa.filter(k => ['alpa', 'a', 'ALPA'].includes(String(k.status))).length;

        totalPoinAbsensi = (alp * 3) + (izn * 1) + (skt * 0.5);
        detailAbsenString = `${alp} Alpa, ${izn} Izin, ${skt} Sakit`;
      }

      const totalPoinGabunganAkhir = totalPoinTataTertib + totalPoinAbsensi;

      if (barisTabelCetak === '') {
        const nihil = `<tr><td colspan="4" style="padding: 15px; text-align: center; color: #64748b; font-style: italic; font-size: 12px; border: 1px solid #000000;">Tidak ada catatan riwayat pelanggaran tata tertib.</td></tr>`;

    function hitungAbsenSekreLokal() {
      var tbody = document.getElementById('bodySekreKH');
      if (!tbody) return;

      var bln = document.getElementById('filterBulanSK')?.value || '';
      var kelasSaya = currentUser && currentUser.kelas ? currentUser.kelas : '';

      // Ambil data cadangan lokal jika data RAM sempat dikosongkan sistem
      if ((!DB.kehadiran || DB.kehadiran.length === 0) && localStorage.getItem('kesiswaan_backup_absen')) {
        DB.kehadiran = JSON.parse(localStorage.getItem('kesiswaan_backup_absen'));
      }

      var siswaKelas = (DB.siswa || []).filter(function (s) { return s.kelas === kelasSaya; });

      if (siswaKelas.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="py-8 text-center text-gray-400 italic">Tidak ada data siswa di kelas ${kelasSaya}</td></tr>`;
        return;
      }

      // Petakan data ketidakhadiran (Hadir, Sakit, Izin, Alpa) dan hitung poinnya
      var htmlRows = siswaKelas.map(function (s, index) {
        var logSiswa = (DB.kehadiran || []).filter(function (k) { return String(k.siswaId) == String(s.id); });
        if (bln) {
          logSiswa = logSiswa.filter(function (k) { return k.tanggal && k.tanggal.split('-')[1] === bln; });
        }

        var hdR = logSiswa.filter(function (k) { return k.status && ['hadir', 'h'].includes(k.status.toLowerCase().trim()); }).length;
        var sK = logSiswa.filter(function (k) { return k.status && ['sakit', 's'].includes(k.status.toLowerCase().trim()); }).length;
        var iZ = logSiswa.filter(function (k) { return k.status && ['izin', 'i'].includes(k.status.toLowerCase().trim()); }).length;
        var aL = logSiswa.filter(function (k) { return k.status && ['alpa', 'a'].includes(k.status.toLowerCase().trim()); }).length;
        var pAbsen = (aL * 3) + (iZ * 1) + (sK * 0.5);

        return `
      <tr class="border-t dark:border-gray-700/50 hover:bg-gray-50/50 text-xs text-gray-700 dark:text-gray-200">
        <td class="py-3 px-4 text-center font-mono text-gray-400">${index + 1}</td>
        <td class="py-3 px-4 font-semibold text-gray-900 dark:text-white">${s.nama}</td>
        <td class="text-center py-3 px-4 font-bold text-emerald-600 dark:text-emerald-400">${hdR}</td>
        <td class="text-center py-3 px-4 font-medium text-amber-600 dark:text-amber-400">${sK}</td>
        <td class="text-center py-3 px-4 font-medium text-blue-600 dark:text-blue-400">${iZ}</td>
        <td class="text-center py-3 px-4 font-medium text-red-600 dark:text-red-400">${aL}</td>
        <td class="text-center py-3 px-4">
          <span class="inline-block px-2.5 py-0.5 ${pAbsen > 0 ? 'bg-red-100 text-red-700 dark:bg-red-900/30' : 'bg-green-100 text-green-700 dark:bg-green-900/30'} rounded-full text-xs font-bold">
            ${pAbsen} Poin
          </span>
        </td>
      </tr>
    `;
      }).join('');

      tbody.innerHTML = htmlRows;
    }

function eksekusiHapusTanggalFiktif(tanggal) {
    const tglBersih = String(tanggal).trim();

    if (!confirm(
        `⚠️ KONFIRMASI\n\nHapus seluruh data absensi tanggal ${tglBersih} ?`
    )) return;

    try {

        if (!Array.isArray(DB.kehadiran))
            DB.kehadiran = [];

        if (!Array.isArray(DB.hariAktif))
            DB.hariAktif = [];

        // 1. Hapus seluruh log absensi
        DB.kehadiran = DB.kehadiran.filter(k =>
            String(k.tanggal).trim() !== tglBersih
        );

        // 2. Hapus hari efektif
        DB.hariAktif = DB.hariAktif.filter(h =>
            String(h.tanggal).trim() !== tglBersih
        );

        // 3. Simpan ke Firebase
        simpanDataKeStorage();

function unduhRekapBulananAdmin() {
      const kelasTerpilih = document.getElementById('filterKelasAdminKH')?.value || '';
      const bulanTerpilih = document.getElementById('filterBulanAdminKH')?.value || '';

      const namaBulanArr = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const labelBulan = bulanTerpilih ? namaBulanArr[parseInt(bulanTerpilih) - 1] : "Semua Bulan";
      const labelKelas = kelasTerpilih ? kelasTerpilih : "Semua Kelas";

      let daftarSiswa = [...(DB.siswa || [])];

      if (kelasTerpilih) {
        daftarSiswa = daftarSiswa.filter(s => s.kelas === kelasTerpilih);
      }

      // ===========================
      // URUTKAN KELAS → NAMA
      // ===========================
      daftarSiswa.sort((a, b) => {
        const kelas = a.kelas.localeCompare(
          b.kelas,
          'id',
          { numeric: true }
        );
        if (kelas !== 0) return kelas;
        return a.nama.localeCompare(b.nama, 'id');
      });

      if (daftarSiswa.length === 0) {
        showToast('Tidak ada data siswa untuk dicetak', 'error');
        return;
      }

      // ----------------------------------------------------
      // HITUNG HARI EFEKTIF GLOBAL BERDASARKAN TOTAL TANGGAL UNIK DI BULAN INI
      // ----------------------------------------------------
      let seluruhLogKehadiran = DB.kehadiran || [];
      
      let logBulanIni = seluruhLogKehadiran;
      if (bulanTerpilih) {
        logBulanIni = seluruhLogKehadiran.filter(k => k.tanggal && k.tanggal.split('-')[1] === bulanTerpilih);
      }

      // Ambil daftar tanggal unik global (milik semua kelas yang sudah pernah menginput di bulan ini)
      const daftarTanggalUnikGlobal = [...new Set(logBulanIni.map(k => k.tanggal).filter(Boolean))];

      // Jika belum ada satu pun kelas yang menginput absen di bulan ini -> Tampilkan Error
      if (daftarTanggalUnikGlobal.length === 0) {
        showToast(`Belum ada data absensi yang diinput pada periode ${labelBulan}!`, 'error');

      // Hari efektif dikunci menggunakan total tanggal unik global
      const hariEfektifGlobal = daftarTanggalUnikGlobal.length;

        let logAbsenSiswa = logBulanIni.filter(k => String(k.siswaId) == String(s.id));

        const skt = logAbsenSiswa.filter(k => ['sakit', 's'].includes(String(k.status || '').toLowerCase().trim())).length;
